<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Film In The Blank</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#f5f5f5;font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ── Layout ── */
.page{min-height:100vh;display:flex;flex-direction:column;background:#0a0a0a;}
.header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:#fff;}
.logo span{color:#f59e0b;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.8rem;}

/* ── Buttons ── */
.btn{padding:.6rem 1.4rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:#f59e0b;color:#000;}
.btn-green{background:#16a34a;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}
.btn-gray{background:#333;color:#eee;}
.btn-outline{background:transparent;border:1.5px solid #444;color:#eee;}
.btn-lg{font-size:1.1rem;padding:.8rem 2.2rem;border-radius:10px;}
.row{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;justify-content:center;}

/* ── Misc ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #444;border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.dot-live{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;background:#16a34a;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.input-field{width:100%;background:#1a1a1a;border:1.5px solid #333;border-radius:8px;color:#eee;font-family:'DM Sans',sans-serif;font-size:.95rem;padding:.7rem .9rem;outline:none;}
.input-field:focus{border-color:#555;}
.input-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:#777;display:block;margin-bottom:.35rem;}
.input-group{margin:.6rem 0;width:100%;}
.card-surface{background:#111;border-radius:16px;padding:1.8rem;border:1.5px solid #222;width:100%;max-width:440px;}
.error-msg{color:#f87171;font-size:.82rem;margin-top:.3rem;}

/* ── Award show announcement ── */
.announcement-wrap{text-align:center;max-width:760px;width:100%;}
.curtain-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1.15rem;color:#aaa;letter-spacing:1px;margin-bottom:.6rem;}
.announce-title{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:3px;color:#f5f5f5;line-height:1.1;margin-bottom:.4rem;}
.announce-title span{color:#f59e0b;}
.featuring-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:#777;margin:.5rem 0;}
.cards-reveal{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;min-height:60px;margin:.6rem 0;}
.reveal-card{background:#161616;border:1.5px solid #333;border-radius:12px;padding:.8rem 1.1rem;font-size:.9rem;color:#f5f5f5;display:flex;align-items:center;gap:.5rem;opacity:0;transform:translateY(12px) scale(.95);transition:opacity .45s ease, transform .45s ease;}
.reveal-card.visible{opacity:1;transform:translateY(0) scale(1);}
.reveal-card-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#f59e0b;line-height:1;}
.are-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1.4rem;color:#f59e0b;margin-top:.4rem;opacity:0;transition:opacity .6s ease;}
.are-label.visible{opacity:1;}
.divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#f59e0b,transparent);margin:.5rem auto;}

/* ── PIN display ── */
.pin-display{font-family:'Bebas Neue',sans-serif;font-size:6rem;letter-spacing:12px;color:#f59e0b;line-height:1;text-align:center;}
.pin-sub{font-size:.85rem;color:#555;text-align:center;margin-top:.3rem;letter-spacing:1px;text-transform:uppercase;}

/* ── Director/team list ── */
.directors-grid{display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:560px;}
.director-row{display:flex;align-items:center;gap:1rem;background:#111;border-radius:12px;padding:.85rem 1.2rem;border:1.5px solid #222;}
.director-swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
.director-name{font-weight:600;font-size:1rem;}
.waiting-directors{color:#555;font-style:italic;font-size:.9rem;text-align:center;}

/* ── Submissions ── */
.subs-grid{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;width:100%;max-width:960px;}
.sub-box{flex:1;min-width:180px;background:#111;border-radius:14px;padding:1rem 1.2rem;border:1.5px solid #222;}
.sub-title{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:.5rem;font-weight:600;}
.sub-waiting{font-size:.85rem;color:#555;font-style:italic;}
.sub-scene{font-size:.9rem;color:#eee;}
.sub-link{font-size:.68rem;color:#555;word-break:break-all;margin-top:.2rem;}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem;}
.tag{padding:.15rem .55rem;border-radius:999px;font-size:.7rem;font-weight:500;}
.scored-badge{display:inline-block;padding:.1rem .5rem;border-radius:999px;font-size:.7rem;font-weight:600;background:#14532d;color:#86efac;margin-left:.5rem;}

/* ── Score bar ── */
.score-chips{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
.score-chip{padding:.3rem .9rem;border-radius:999px;font-weight:600;font-size:.88rem;color:#fff;}
.round-badge{background:#222;color:#aaa;padding:.25rem .7rem;border-radius:6px;font-size:.8rem;}

/* ── Dispute ── */
.dispute-cards{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
.dispute-card{padding:.5rem .9rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:500;user-select:none;transition:all .15s;}
.dispute-card.on{background:#16a34a;color:#fff;border:1.5px solid #16a34a;}
.dispute-card.off{background:#1a1a1a;color:#888;border:1.5px solid #333;text-decoration:line-through;}

/* ── Video ── */
.video-area{width:100%;max-width:800px;}
.video-area iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;}
.review-label{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;text-align:center;margin-bottom:.8rem;}

/* ── Winner screen ── */
.winner-screen{text-align:center;padding:2rem;}
.winner-envelope{font-family:'Playfair Display',serif;font-style:italic;font-size:1.3rem;color:#aaa;margin-bottom:.5rem;}
.winner-and{font-family:'Playfair Display',serif;font-style:italic;font-size:1.6rem;color:#f5f5f5;margin:.3rem 0;}
.winner-award{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#f59e0b;margin-bottom:.8rem;}
.winner-goes-to{font-family:'Playfair Display',serif;font-style:italic;font-size:1.4rem;color:#aaa;margin-bottom:.5rem;}
.winner-name{font-family:'Bebas Neue',sans-serif;letter-spacing:4px;color:#f59e0b;opacity:0;transform:scale(.8);transition:opacity .8s ease, transform .8s ease;}
.winner-name.visible{opacity:1;transform:scale(1);}
.winner-applause{font-size:2rem;margin-top:.8rem;opacity:0;transition:opacity .5s ease .8s;}
.winner-applause.visible{opacity:1;}
.final-scores{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;margin:1.5rem 0;}
.final-score{text-align:center;}
.final-score-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;}
.final-score-label{font-size:.8rem;color:#777;text-transform:uppercase;letter-spacing:1px;}

/* ── Coin ── */
.coin{font-size:3rem;display:block;text-align:center;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#111;border:1.5px solid #333;border-radius:20px;padding:2.5rem 3rem;text-align:center;max-width:360px;width:90%;}

/* ── Player/Director page ── */
.player-page{min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;}
.player-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;color:#fff;margin-bottom:1.5rem;text-align:center;}
.player-logo span{color:#f59e0b;}
.color-picker{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin:.5rem 0;}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}
.player-card-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;background:#1a1a1a;border-radius:10px;cursor:pointer;border:1.5px solid transparent;margin-bottom:.5rem;transition:all .15s;}
.player-card-num{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#f59e0b;width:22px;text-align:center;}
.player-card-text{font-size:.88rem;color:#ddd;}
.pin-input{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:8px;text-align:center;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#f59e0b;width:100%;padding:.6rem;outline:none;}
.pin-input:focus{border-color:#f59e0b;}
.nomination-header{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:#888;margin-bottom:.8rem;text-align:center;line-height:1.5;}
.nomination-cards{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1rem;}
.nomination-card-tag{padding:.25rem .7rem;border-radius:999px;font-size:.78rem;font-weight:600;background:#1a1a1a;border:1px solid #333;color:#f59e0b;}
</style>

var _db=firebase.database();
function dbGet(p){return _db.ref(p).get().then(function(s){return s.exists()?s.val():null;});}
function dbSet(p,v){return _db.ref(p).set(v);}
function dbUpdate(p,v){return _db.ref(p).update(v);}
function dbSub(p,cb){var r=_db.ref(p);r.on('value',function(s){cb(s.exists()?s.val():null);});return function(){r.off();};}
function dbPush(p,v){return _db.ref(p).push(v);}

// Wrap dbGet with a timeout so a Firebase hang never freezes the UI
function dbGetSafe(p){
  return Promise.race([
    dbGet(p),
    new Promise(function(_,reject){setTimeout(function(){reject(new Error("timeout"));},8000);})
  ]);
}

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const CARD_POOL=[
  "Comedy","Drama","Horror","Action","Romance","Animated","Sci-Fi","Documentary","Musical","Thriller",
  "With Brad Pitt","With Meryl Streep","With Tom Hanks","With Leonardo DiCaprio","With Cate Blanchett",
  "With Denzel Washington","With Jennifer Lawrence","With Morgan Freeman","With Scarlett Johansson","With Will Smith",
  "Has a car chase","Has a wedding","Has a funeral","Has a dance scene","Has a courtroom scene",
  "Has a heist","Has a chase on foot","Has a montage","Has a dream sequence","Has a party",
  "Has a lawnmower","Has a dog","Has a gun","Has a cake","Has a ladder",
  "Has a phone call","Has a mirror","Has a briefcase","Has a sword","Has a newspaper",
  "Takes place outside","Takes place at night","Takes place in winter","Takes place in a city","Takes place in space",
  "Takes place at school","Takes place at a party","Takes place on a boat","Takes place in a hospital","Takes place in the past",
  "1990s film","2000s film","2010s film","Before 1990","Based on a true story",
  "Won an Award","Directed by a woman","Foreign language film","A sequel","A remake",
];

const PALETTE=[
  {hex:"#e53935",name:"Red"},{hex:"#1e88e5",name:"Blue"},{hex:"#43a047",name:"Green"},
  {hex:"#fb8c00",name:"Orange"},{hex:"#8e24aa",name:"Purple"},{hex:"#e91e63",name:"Pink"},
  {hex:"#00acc1",name:"Teal"},{hex:"#fdd835",name:"Yellow"},{hex:"#6d4c41",name:"Brown"},
  {hex:"#00897b",name:"Mint"},{hex:"#e64a19",name:"Crimson"},{hex:"#5c6bc0",name:"Indigo"},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick5(){return shuffle(CARD_POOL).slice(0,5);}
function genPin(){return String(Math.floor(1000+Math.random()*9000));}
function generateRounds(){return Array.from({length:5},(_,i)=>({round:i+1,cards:pick5(),submissions:{},scores:{},scored:{}}));}
function hex2rgba(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}catch(e){return hex;}}
function extractYouTubeId(url){try{const u=new URL(url);if(u.hostname.includes("youtu.be"))return u.pathname.slice(1).split("?")[0];return u.searchParams.get("v");}catch(e){return null;}}
function isYouTubeUrl(url){return /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)/.test(url);}

/* ── QR Code ── */
function QRBlock({url,size}){
  const sz=size||160;
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.QRCode)return;
    ref.current.innerHTML="";
    new window.QRCode(ref.current,{text:url,width:sz,height:sz,colorDark:"#000000",colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.M});
  },[url,sz]);
  return <div style={{display:"inline-block",background:"#fff",borderRadius:12,padding:10,marginTop:".6rem"}}><div ref={ref}/></div>;
}

/* ── Coin Flip ── */
function CoinFlip({onClose}){
  const [result,setResult]=useState(null);
  const [flipping,setFlipping]=useState(false);
  const flip=()=>{setFlipping(true);setResult(null);setTimeout(()=>{setResult(Math.random()<.5?"HEADS":"TAILS");setFlipping(false);},700);};
  return(
    <div className="overlay">
      <div className="modal">
        <p style={{color:"#aaa",fontSize:".8rem",textTransform:"uppercase",letterSpacing:2,marginBottom:"1rem"}}>Coin Flip</p>
        {flipping&&<span className="coin">🪙</span>}
        {result&&<div><span className="coin">🪙</span><p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.5rem",color:"#f59e0b",letterSpacing:3}}>{result}</p></div>}
        {!result&&!flipping&&<div style={{height:70,display:"flex",alignItems:"center",justifyContent:"center",color:"#555"}}>Press flip!</div>}
        <div className="row" style={{marginTop:"1.2rem"}}>
          <button className="btn btn-gold" onClick={flip}>Flip!</button>
          <button className="btn btn-gray" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── Card Reveal Announcement ── */
function CardAnnouncement({cards, onDone}){
  const [revealed,setRevealed]=useState([]);
  const [showAre,setShowAre]=useState(false);
  const [done,setDone]=useState(false);

  useEffect(()=>{
    // Reveal cards one by one, 900ms apart
    const timers=[];
    cards.forEach(function(_,i){
      timers.push(setTimeout(()=>{
        setRevealed(function(r){return r.includes(i)?r:[...r,i];});
      },(i+1)*900));
    });
    // Show "...are" after all cards
    timers.push(setTimeout(()=>setShowAre(true),(cards.length+1)*900));
    // Signal done after a beat
    timers.push(setTimeout(()=>setDone(true),(cards.length+2)*900+400));
    return()=>timers.forEach(clearTimeout);
  },[]);

  useEffect(()=>{ if(done&&onDone) onDone(); },[done]);

  return(
    <div className="announcement-wrap">
      <div className="curtain-label">🎬 Round Announcement</div>
      <div className="divider"/>
      <div className="announce-title">The Nominees for</div>
      <div className="announce-title"><span>Best Movie Scene</span></div>
      <div className="featuring-label">featuring…</div>
      <div className="cards-reveal">
        {cards.map(function(c,i){return(
          <div key={i} className={"reveal-card"+(revealed.includes(i)?" visible":"")}>
            <span className="reveal-card-num">{i+1}</span>
            <span>{c}</span>
          </div>
        );})}
      </div>
      <div className={"are-label"+(showAre?" visible":"")}>…are</div>
    </div>
  );
}

/* ── Winner Reveal ── */
function WinnerReveal({winners, scores, allDirectors, onPlayAgain}){
  const [step,setStep]=useState(0);
  // step 0: "opening envelope" text
  // step 1: show award name
  // step 2: reveal winner name
  // step 3: show scores + play again

  useEffect(()=>{
    const t1=setTimeout(()=>setStep(1),1800);
    const t2=setTimeout(()=>setStep(2),3400);
    const t3=setTimeout(()=>setStep(3),5200);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);

  const isTie=winners.length>1;

  return(
    <div className="winner-screen">
      {step>=0&&<div className="winner-envelope" style={{opacity:step>=1?.3:1,transition:"opacity .8s"}}>
        — And the award for Best Director is… —
      </div>}
      {step>=1&&<div className="winner-award" style={{animation:"fadeIn .6s ease forwards"}}>
        🏆 Best Director 🏆
      </div>}
      {step>=2&&(
        <div className={"winner-name"+(step>=2?" visible":"")} style={{fontSize:isTie?"3rem":"4.5rem"}}>
          {isTie?winners.map(function(w){return w.name;}).join(" & "):winners[0].name}
        </div>
      )}
      {step>=2&&<div className={"winner-applause"+(step>=2?" visible":"")}>🎬 🎉 🏆</div>}
      {step>=3&&(
        <>
          <div className="divider" style={{margin:"1.5rem auto"}}/>
          <div className="final-scores">
            {allDirectors.map(function(d){return(
              <div key={d.id} className="final-score">
                <div className="final-score-num" style={{color:d.color}}>{scores[d.id]||0}</div>
                <div className="final-score-label">{d.name}</div>
              </div>
            );})}
          </div>
          <button className="btn btn-gold btn-lg" onClick={onPlayAgain} style={{marginTop:"1rem"}}>Play Again</button>
        </>
      )}
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}`}</style>
    </div>
  );
}

/* ══════════ PLAYER APP ══════════════════════════════ */
const PLAYER_STORAGE_KEY="fitb_player_session";

function savePlayerSession(pin,teamId,teamName,teamColor){
  try{localStorage.setItem(PLAYER_STORAGE_KEY,JSON.stringify({pin,teamId,teamName,teamColor,savedAt:Date.now()}));}catch(e){}
}
function loadPlayerSession(){
  try{
    const s=localStorage.getItem(PLAYER_STORAGE_KEY);
    if(!s)return null;
    const d=JSON.parse(s);
    // Sessions expire after 12 hours
    if(Date.now()-d.savedAt>12*60*60*1000){localStorage.removeItem(PLAYER_STORAGE_KEY);return null;}
    return d;
  }catch(e){return null;}
}
function clearPlayerSession(){
  try{localStorage.removeItem(PLAYER_STORAGE_KEY);}catch(e){}
}

// Read PIN from URL hash e.g. #player?pin=1234
function getPinFromUrl(){
  const hash=window.location.hash;
  const match=hash.match(/[?&]pin=(\d{4})/);
  return match?match[1]:null;
}

function PlayerApp(){
  const [screen,setScreen]=useState("loading"); // loading|pin|join|lobby|game|submitted
  const [pin,setPin]=useState("");
  const [pinInput,setPinInput]=useState("");
  const [game,setGame]=useState(null);
  const [teamId,setTeamId]=useState(null);
  const [teamName,setTeamName]=useState("");
  const [teamColor,setTeamColor]=useState(PALETTE[0].hex);
  const [error,setError]=useState("");
  const [busy,setBusy]=useState(false);
  const [link,setLink]=useState("");
  const [scene,setScene]=useState("");
  const [selected,setSelected]=useState([]);
  const [submitError,setSubmitError]=useState("");
  const [syncing,setSyncing]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const roundRef=useRef(null);
  const unsubRef=useRef(null);

  // On mount: try to restore session or auto-fill PIN from URL
  useEffect(()=>{
    (async function(){
      try{
        // 1. Try to restore from localStorage
        const session=loadPlayerSession();
        if(session){
          const g=await dbGetSafe("games/"+session.pin);
          if(g&&(g.status==="lobby"||g.status==="started")){
            if(g.teams&&g.teams[session.teamId]){
              setPin(session.pin);
              setTeamId(session.teamId);
              setTeamName(session.teamName);
              setTeamColor(session.teamColor);
              setGame(g);
              setScreen(g.status==="started"?"game":"lobby");
              subscribeGame(session.pin);
              return;
            }
          }
          clearPlayerSession();
        }
        // 2. Check for PIN in QR URL
        const urlPin=getPinFromUrl();
        if(urlPin){
          setPinInput(urlPin);
          const g=await dbGetSafe("games/"+urlPin);
          if(g&&g.status==="lobby"){
            const dirs=g.teams?Object.values(g.teams):[];
            if(dirs.length<8){
              setPin(urlPin);
              setGame(g);
              setScreen("join");
              return;
            }
          }
          setPinInput(urlPin);
        }
      }catch(e){
        console.warn("Startup error:",e);
      }
      setScreen("pin");
    })();
  },[]);

  function subscribeGame(p){
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=dbSub("games/"+p,function(g){
      if(!g)return;
      setGame(g);
      if(g.status==="started")setScreen("game");
      if(g.status==="lobby")setScreen("lobby");
    });
  }

  useEffect(()=>{
    if(!pin||!teamId)return;
    subscribeGame(pin);
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[pin,teamId]);

  useEffect(()=>{
    if(!game)return;
    const r=game.currentRound;
    if(roundRef.current!==null&&roundRef.current!==r){
      setSubmitted(false);setSelected([]);setLink("");setScene("");setSubmitError("");
    }
    roundRef.current=r;
  },[game&&game.currentRound]);

  const joinPin=async()=>{
    setError("");
    const p=pinInput.trim();
    if(p.length!==4||isNaN(Number(p))){setError("Enter the 4-digit PIN from the host screen.");return;}
    setBusy(true);
    const g=await dbGetSafe("games/"+p);
    if(!g){setError("Game not found. Check the PIN and try again.");setBusy(false);return;}
    if(g.status!=="lobby"){setError("This game has already started.");setBusy(false);return;}
    const dirs=g.teams?Object.values(g.teams):[];
    if(dirs.length>=8){setError("This game is full (8 directors max).");setBusy(false);return;}
    setPin(p);
    setGame(g);
    setScreen("join");
    setBusy(false);
  };

  const joinGame=async()=>{
    setError("");
    if(!teamName.trim()){setError("Please enter a director name.");return;}
    if(teamName.trim().length>20){setError("Name must be 20 characters or less.");return;}
    const g=await dbGetSafe("games/"+pin);
    const existing=g&&g.teams?Object.values(g.teams):[];
    if(existing.find(function(t){return t.color===teamColor;})){setError("That color is taken! Pick another.");return;}
    if(existing.find(function(t){return t.name.toLowerCase()===teamName.trim().toLowerCase();})){setError("That name is taken!");return;}
    setBusy(true);
    const pushRef=await dbPush("games/"+pin+"/teams",{name:teamName.trim(),color:teamColor,score:0});
    const newTeamId=pushRef.key;
    setTeamId(newTeamId);
    // Save session to localStorage so they can return after switching apps
    savePlayerSession(pin,newTeamId,teamName.trim(),teamColor);
    setScreen("lobby");
    setBusy(false);
  };

  const submitScene=async()=>{
    setSubmitError("");
    if(!link.trim()){setSubmitError("Please paste a YouTube link.");return;}
    if(!isYouTubeUrl(link.trim())){setSubmitError("Only YouTube links are allowed!");return;}
    if(!extractYouTubeId(link.trim())){setSubmitError("Couldn't parse a video ID.");return;}
    if(selected.length===0){setSubmitError("Select at least one card.");return;}
    setSyncing(true);
    const round=game.currentRound;
    await dbSet("games/"+pin+"/rounds/"+round+"/submissions/"+teamId,{
      link:link.trim(),scene:scene.trim()||"Untitled scene",cards:selected,
      teamName:teamName||(game.teams&&game.teams[teamId]?game.teams[teamId].name:"Director"),
      teamColor:teamColor||(game.teams&&game.teams[teamId]?game.teams[teamId].color:"#888"),
    });
    setSyncing(false);setSubmitted(true);
  };

  /* Loading screen while we check localStorage / URL */
  if(screen==="loading")return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <span className="spinner"/>
    </div>
  );

  /* PIN screen — fallback for manual entry */
  if(screen==="pin")return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <div className="card-surface">
        <p style={{color:"#777",fontSize:".85rem",marginBottom:"1.2rem",textAlign:"center"}}>Enter the PIN shown on the host screen</p>
        <input className="pin-input" value={pinInput} onChange={function(e){setPinInput(e.target.value.replace(/\D/g,"").slice(0,4));}} placeholder="0000" maxLength={4} inputMode="numeric" onKeyDown={function(e){if(e.key==="Enter")joinPin();}}/>
        {error&&<p className="error-msg" style={{textAlign:"center",marginTop:".5rem"}}>{error}</p>}
        <button className="btn btn-gold btn-lg" style={{width:"100%",marginTop:"1rem"}} onClick={joinPin} disabled={busy||pinInput.length!==4}>
          {busy?"Checking…":"Join Game →"}
        </button>
      </div>
    </div>
  );

  /* Join / create director */
  if(screen==="join")return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <div className="card-surface">
        <p style={{color:"#777",fontSize:".85rem",marginBottom:"1rem",textAlign:"center"}}>Create your director</p>
        <div className="input-group">
          <label className="input-label">Director Name</label>
          <input className="input-field" value={teamName} onChange={function(e){setTeamName(e.target.value);}} placeholder="e.g. Spielberg Jr." maxLength={20}/>
        </div>
        <div className="input-group">
          <label className="input-label">Your Color</label>
          <div className="color-picker">
            {PALETTE.map(function(p){
              const taken=game&&game.teams?Object.values(game.teams).find(function(t){return t.color===p.hex;}):false;
              return <div key={p.hex} className={"color-swatch"+(teamColor===p.hex?" selected":"")} style={{background:p.hex,opacity:taken?.25:1,cursor:taken?"not-allowed":"pointer"}} onClick={function(){if(!taken)setTeamColor(p.hex);}} title={taken?p.name+" (taken)":p.name}/>;
            })}
          </div>
        </div>
        {error&&<p className="error-msg">{error}</p>}
        <button className="btn btn-gold btn-lg" style={{width:"100%",marginTop:"1rem"}} onClick={joinGame} disabled={busy||!teamName.trim()}>
          {busy?"Joining…":"Enter the Room →"}
        </button>
      </div>
    </div>
  );

  /* Lobby */
  if(screen==="lobby"&&game)return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <div className="card-surface" style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#888",fontSize:".95rem",marginBottom:".8rem"}}>Welcome to the screening room</div>
        <p style={{color:"#777",fontSize:".85rem",marginBottom:"1rem"}}>Waiting for the host to call action…</p>
        <div style={{margin:"1rem 0"}}>
          {game.teams&&Object.values(game.teams).map(function(t,i){return(
            <div key={i} className="director-row" style={{borderColor:hex2rgba(t.color,.4)}}>
              <div className="director-swatch" style={{background:t.color}}/>
              <span className="director-name" style={{color:t.color}}>{t.name}</span>
              {t.name===teamName&&<span style={{marginLeft:"auto",fontSize:".75rem",color:"#16a34a"}}>← You</span>}
            </div>
          );})}
        </div>
        <p style={{color:"#555",fontSize:".8rem",marginBottom:"1rem"}}>PIN: <strong style={{color:"#f59e0b",letterSpacing:2}}>{pin}</strong></p>
        <button className="btn btn-outline" style={{fontSize:".75rem"}} onClick={function(){clearPlayerSession();setScreen("pin");setPinInput("");}}>Leave Game</button>
      </div>
    </div>
  );

  /* Game screen */
  if(screen==="game"&&game){
    const round=game.rounds&&game.rounds[game.currentRound];
    if(!round)return <div className="player-page"><span className="spinner"/>Loading…</div>;
    const myTeam=game.teams&&game.teams[teamId];
    const myColor=(myTeam&&myTeam.color)||teamColor||"#f59e0b";
    const alreadySubmitted=round.submissions&&round.submissions[teamId]!=null;

    if(alreadySubmitted||submitted)return(
      <div className="player-page">
        <div style={{textAlign:"center",padding:"2rem"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"1rem",color:"#777",marginBottom:".5rem"}}>Your nomination has been submitted</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.5rem",letterSpacing:2,color:myColor}}>Awaiting the Verdict</div>
          <p style={{color:"#555",marginTop:".5rem",fontSize:".85rem"}}>The host is reviewing all nominations…</p>
          <div style={{marginTop:"1.5rem"}}>
            <p style={{color:"#555",fontSize:".78rem",marginBottom:".5rem"}}>Your nominated cards:</p>
            <div className="tags" style={{justifyContent:"center"}}>
              {selected.map(function(i){return <span key={i} className="tag" style={{background:hex2rgba(myColor,.2),color:myColor}}>{round.cards[i]}</span>;})}
            </div>
          </div>
        </div>
      </div>
    );

    return(
      <div className="player-page">
        <div style={{color:myColor,fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.6rem",letterSpacing:2,marginBottom:".3rem"}}>{myTeam?myTeam.name:"Your Director"}</div>
        <div className="card-surface">
          {/* Award show framing on player screen */}
          <div className="nomination-header">
            Submit your nomination for<br/>
            <strong style={{color:"#f5f5f5"}}>Best Movie Scene</strong> featuring:
          </div>
          <div className="nomination-cards">
            {round.cards.map(function(c,i){return <span key={i} className="nomination-card-tag">{c}</span>;})}
          </div>
          <p style={{fontSize:".78rem",color:"#555",marginBottom:".6rem"}}>Tap the cards your scene covers:</p>
          {round.cards.map(function(c,i){
            const sel=selected.includes(i);
            return(
              <div key={i} className="player-card-item" onClick={function(){setSelected(function(s){return s.includes(i)?s.filter(function(x){return x!==i;}):[...s,i];});}} style={{background:sel?hex2rgba(myColor,.15):"#1a1a1a",borderColor:sel?myColor:"transparent"}}>
                <span className="player-card-num">{i+1}</span>
                <span className="player-card-text">{c}</span>
                {sel&&<span style={{marginLeft:"auto",color:myColor}}>✓</span>}
              </div>
            );
          })}
          <div className="input-group" style={{marginTop:".5rem"}}>
            <label className="input-label">YouTube Link</label>
            <input className="input-field" value={link} onChange={function(e){setLink(e.target.value);}} placeholder="https://youtube.com/watch?v=…"/>
          </div>
          <div className="input-group">
            <label className="input-label">Scene Description (optional)</label>
            <input className="input-field" value={scene} onChange={function(e){setScene(e.target.value);}} placeholder="e.g. The cerulean sweater speech in The Devil Wears Prada"/>
          </div>
          {submitError&&<p className="error-msg">{submitError}</p>}
          <button className="btn btn-gold" style={{width:"100%",marginTop:".6rem",padding:".7rem"}} onClick={submitScene} disabled={syncing}>
            {syncing?"Submitting Nomination…":"🎬 Submit Nomination"}
          </button>
        </div>
      </div>
    );
  }

  return <div className="player-page"><span className="spinner"/>Connecting…</div>;
}

/* ══════════ HOST APP ════════════════════════════════ */
function HostApp(){
  const [game,setGame]=useState(null);
  const [pin,setPin]=useState(null);
  const [loading,setLoading]=useState(true);
  const [showCoin,setShowCoin]=useState(false);
  const [disputeState,setDisputeState]=useState(null);
  const [watchingTeam,setWatchingTeam]=useState(null);
  const [announcing,setAnnouncing]=useState(false);
  const pinRef=useRef(null);

  const subscribeGame=useCallback(function(p){
    dbSub("games/"+p,function(fresh){
      if(!fresh)return;
      setGame(function(){return Object.assign({},fresh);});
    });
  },[]);

  useEffect(()=>{
    (async function(){
      try{
        let savedPin=localStorage.getItem("fitb_host_pin");
        if(savedPin){
          const g=await dbGetSafe("games/"+savedPin);
          if(g){
            pinRef.current=savedPin;
            setPin(savedPin);
            setLoading(false);
            subscribeGame(savedPin);
            return;
          }
        }
        const newPin=genPin();
        const rounds=generateRounds();
        await dbSet("games/"+newPin,{pin:newPin,status:"lobby",currentRound:0,totalScores:{},rounds:rounds,teams:{}});
        localStorage.setItem("fitb_host_pin",newPin);
        pinRef.current=newPin;
        setPin(newPin);
        setLoading(false);
        subscribeGame(newPin);
      }catch(e){
        console.warn("Host startup error:",e);
        // If Firebase fails, still unblock the UI
        setLoading(false);
      }
    })();
  },[]);

  const resetGame=async()=>{
    const newPin=genPin();
    const rounds=generateRounds();
    await dbSet("games/"+newPin,{pin:newPin,status:"lobby",currentRound:0,totalScores:{},rounds:rounds,teams:{}});
    localStorage.setItem("fitb_host_pin",newPin);
    pinRef.current=newPin;
    setPin(newPin);
    setDisputeState(null);
    setWatchingTeam(null);
    setAnnouncing(false);
    subscribeGame(newPin);
  };

  const startGame=async()=>{
    setAnnouncing(true);
    await dbUpdate("games/"+pinRef.current,{status:"started",currentRound:0});
  };

  const awardPoints=async(teamId,pts)=>{
    const cur=game.currentRound;
    const prev=(game.totalScores&&game.totalScores[teamId])||0;
    const su={};su[teamId]=pts;
    const sc={};sc[teamId]=true;
    const ts={};ts[teamId]=prev+pts;
    await dbUpdate("games/"+pinRef.current+"/rounds/"+cur+"/scores",su);
    await dbUpdate("games/"+pinRef.current+"/rounds/"+cur+"/scored",sc);
    await dbUpdate("games/"+pinRef.current+"/totalScores",ts);
    setWatchingTeam(null);
  };

  const skipRound=async()=>{
    const cur=game.currentRound;
    // Award 0 to anyone who hasn't submitted or been scored yet
    for(const d of directors){
      if(!scored[d.id]){
        const prev=(game.totalScores&&game.totalScores[d.id])||0;
        const su={};su[d.id]=0;
        const sc={};sc[d.id]=true;
        const ts={};ts[d.id]=prev;
        await dbUpdate("games/"+pinRef.current+"/rounds/"+cur+"/scores",su);
        await dbUpdate("games/"+pinRef.current+"/rounds/"+cur+"/scored",sc);
        await dbUpdate("games/"+pinRef.current+"/totalScores",ts);
      }
    }
    await dbUpdate("games/"+pinRef.current,{currentRound:cur+1});
    setDisputeState(null);
    setWatchingTeam(null);
    setAnnouncing(true);
  };
    if(!disputeState)return;
    await awardPoints(disputeState.teamId,disputeState.cards.filter(Boolean).length);
    setDisputeState(null);
  };

  const nextRound=async()=>{
    const cur=game.currentRound;
    await dbUpdate("games/"+pinRef.current,{currentRound:cur+1});
    setDisputeState(null);
    setWatchingTeam(null);
    setAnnouncing(true); // trigger announcement for next round
  };

  if(loading)return(
    <div className="page">
      <div className="header"><div className="logo">Film <span>In</span> The Blank</div></div>
      <div className="main"><span className="spinner"/>Setting up…</div>
    </div>
  );

  if(!game)return(
    <div className="page">
      <div className="header"><div className="logo">Film <span>In</span> The Blank</div></div>
      <div className="main"><span className="spinner"/>Connecting…</div>
    </div>
  );

  const directors=game.teams?Object.entries(game.teams).map(function(e){return Object.assign({id:e[0]},e[1]);}):[];
  const baseUrl=window.location.href.split("?")[0].replace(/#.*/,"");

  /* ── LOBBY ── */
  if(game.status==="lobby")return(
    <div className="page">
      <div className="header">
        <div className="logo">Film <span>In</span> The Blank</div>
        <button className="btn btn-outline" onClick={resetGame} style={{fontSize:".75rem"}}>New Game</button>
      </div>
      <div className="main">
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#777",fontSize:"1rem",marginBottom:".8rem"}}>Welcome to the screening room</div>
          <p style={{color:"#555",fontSize:".85rem",textTransform:"uppercase",letterSpacing:2,marginBottom:".3rem"}}>Game PIN</p>
          <div className="pin-display">{pin}</div>
          <p className="pin-sub" style={{marginTop:".6rem"}}>Scan to join</p>
          <QRBlock url={baseUrl+"#player?pin="+pin} size={160}/>
          <p style={{color:"#444",fontSize:".72rem",marginTop:".5rem"}}>or visit <span style={{color:"#f59e0b"}}>{baseUrl}#player</span> and enter PIN <span style={{color:"#f59e0b"}}>{pin}</span></p>
        </div>
        <div style={{width:"100%",maxWidth:480}}>
          <p style={{color:"#555",fontSize:".78rem",textTransform:"uppercase",letterSpacing:1,marginBottom:".8rem",textAlign:"center"}}>Directors in the room ({directors.length}/8)</p>
          {directors.length===0
            ?<p className="waiting-directors">Waiting for directors to arrive…</p>
            :<div className="directors-grid">
              {directors.map(function(d){return(
                <div key={d.id} className="director-row" style={{borderColor:hex2rgba(d.color,.4)}}>
                  <div className="director-swatch" style={{background:d.color}}/>
                  <span className="director-name" style={{color:d.color}}>{d.name}</span>
                </div>
              );})}
            </div>
          }
        </div>
        <button className="btn btn-gold btn-lg" onClick={startGame} disabled={directors.length<1} style={{minWidth:220}}>
          {directors.length<1?"Waiting for directors…":"🎬 Call Action →"}
        </button>
      </div>
    </div>
  );

  /* ── GAME ── */
  const cur=game.currentRound;
  const round=game.rounds&&game.rounds[cur];
  if(!round)return <div className="page"><div className="main"><span className="spinner"/></div></div>;

  const submissions=round.submissions||{};
  const scored=round.scored||{};
  const scores=round.scores||{};
  const totalScores=game.totalScores||{};
  const anySubmitted=directors.some(function(d){return submissions[d.id]!=null;});
  const allSubmitted=directors.length>0&&directors.every(function(d){return submissions[d.id]!=null;});
  const allScored=directors.length>0&&directors.every(function(d){return scored[d.id];});
  const gameOver=cur>=4&&allScored;

  function getYTEmbed(url){var id=extractYouTubeId(url);return id?"https://www.youtube.com/embed/"+id+"?autoplay=1":null;}

  /* ── WINNER ── */
  if(gameOver){
    const sorted=[...directors].sort(function(a,b){return (totalScores[b.id]||0)-(totalScores[a.id]||0);});
    const topScore=totalScores[sorted[0].id]||0;
    const winners=sorted.filter(function(d){return (totalScores[d.id]||0)===topScore;});
    return(
      <div className="page">
        <div className="header">
          <div className="logo">Film <span>In</span> The Blank</div>
          <button className="btn btn-outline" onClick={resetGame} style={{fontSize:".75rem",visibility:"hidden"}}>New Game</button>
        </div>
        <div className="main">
          <WinnerReveal winners={winners} scores={totalScores} allDirectors={sorted} onPlayAgain={resetGame}/>
        </div>
      </div>
    );
  }

  /* ── ANNOUNCEMENT ── */
  if(announcing)return(
    <div className="page">
      <div className="header">
        <div className="logo">Film <span>In</span> The Blank</div>
        <span className="round-badge">Round {cur+1}/5</span>
      </div>
      <div className="main">
        <CardAnnouncement cards={round.cards} onDone={function(){setAnnouncing(false);}}/>
      </div>
    </div>
  );

  /* ── MAIN GAME SCREEN ── */
  return(
    <div className="page">
      {showCoin&&<CoinFlip onClose={function(){setShowCoin(false);}}/>}
      <div className="header">
        <div className="logo">Film <span>In</span> The Blank</div>
        <div className="score-chips">
          {directors.map(function(d){return(
            <span key={d.id} className="score-chip" style={{background:d.color}}>{d.name}: {totalScores[d.id]||0} pts</span>
          );})}
          <span className="round-badge">Round {cur+1}/5</span>
        </div>
        <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
          <span style={{fontSize:".68rem",color:"#16a34a"}}><span className="dot-live"/>LIVE</span>
          <button className="btn btn-outline" onClick={resetGame} style={{fontSize:".75rem"}}>Reset</button>
        </div>
      </div>

      <div className="main">
        {/* Award show framing on host screen */}
        <div className="announcement-wrap" style={{marginBottom:"-.5rem"}}>
          <div className="curtain-label">🎬 Round {cur+1} — The nominees for <span style={{color:"#f59e0b",fontStyle:"normal",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>Best Movie Scene</span> featuring</div>
          <div className="cards-reveal" style={{marginTop:".4rem"}}>
            {round.cards.map(function(c,i){return(
              <div key={i} className="reveal-card visible">
                <span className="reveal-card-num">{i+1}</span>
                <span>{c}</span>
              </div>
            );})}
          </div>
          <div className="are-label visible">…are</div>
        </div>

        {/* Submissions */}
        <div className="subs-grid">
          {directors.map(function(d){
            const sub=submissions[d.id];
            return(
              <div key={d.id} className="sub-box" style={{borderColor:sub?hex2rgba(d.color,.5):"#222"}}>
                <div className="sub-title" style={{color:d.color}}>
                  {d.name} {sub?"✓":""}
                  {scored[d.id]&&<span className="scored-badge">+{scores[d.id]||0} pts</span>}
                </div>
                {sub?(
                  <div style={{fontSize:".82rem",color:"#aaa",fontFamily:"'Playfair Display',serif",fontStyle:"italic",marginTop:".2rem"}}>
                    Nomination received
                  </div>
                ):(
                  <div className="sub-waiting">Awaiting nomination…</div>
                )}
              </div>
            );
          })}
        </div>

        {/* PIN reminder + manual skip */}
        {!allScored&&(
          <div style={{textAlign:"center"}}>
            {!allSubmitted&&(
              <>
                <p style={{color:"#333",fontSize:".72rem",marginBottom:".2rem"}}>PIN</p>
                <p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2rem",color:"#f59e0b",letterSpacing:6,marginBottom:".8rem"}}>{pin}</p>
              </>
            )}
            {anySubmitted&&!allSubmitted&&(
              <div style={{marginTop:".4rem"}}>
                <p style={{color:"#555",fontSize:".78rem",marginBottom:".5rem",fontFamily:"'Playfair Display',serif",fontStyle:"italic"}}>Still waiting on some directors…</p>
                <button className="btn btn-outline" style={{fontSize:".78rem"}} onClick={()=>setWatchingTeam(null)}>
                  ▶ Start reviewing what's in
                </button>
                {cur<4&&<button className="btn btn-gray" style={{fontSize:".78rem",marginLeft:".5rem"}} onClick={skipRound}>
                  Skip Round →
                </button>}
              </div>
            )}
            {!anySubmitted&&cur<4&&(
              <button className="btn btn-gray" style={{fontSize:".75rem",marginTop:".5rem"}} onClick={skipRound}>
                Skip Round →
              </button>
            )}
          </div>
        )}

        {/* Video review */}
        {anySubmitted&&!allScored&&(
          watchingTeam?(function(){
            const d=directors.find(function(x){return x.id===watchingTeam;});
            const sub=submissions[watchingTeam];
            return(
              <div className="video-area">
                <div className="review-label" style={{color:d.color}}>Now screening: {d.name}</div>
                <iframe src={getYTEmbed(sub.link)} title="Scene" allowFullScreen allow="autoplay"/>
                <div className="row" style={{marginTop:"1rem"}}>
                  {!scored[watchingTeam]?(
                    <>
                      <button className="btn btn-green" onClick={function(){awardPoints(watchingTeam,(sub.cards||[]).length);}}>✓ Grant Full ({(sub.cards||[]).length} pts)</button>
                      <button className="btn btn-red" onClick={function(){setDisputeState({teamId:watchingTeam,cards:(sub.cards||[]).map(function(){return true;})});setWatchingTeam(null);}}>Dispute</button>
                      <button className="btn btn-outline" onClick={function(){setShowCoin(true);}}>🪙 Coin Flip</button>
                      <button className="btn btn-gray" onClick={function(){setWatchingTeam(null);}}>← Back</button>
                    </>
                  ):(
                    <p style={{color:"#16a34a",fontWeight:600}}>+{scores[watchingTeam]} pts awarded!</p>
                  )}
                </div>
              </div>
            );
          })():(
            <div className="row" style={{flexDirection:"column",gap:".6rem"}}>
              <p style={{color:"#888",fontFamily:"'Playfair Display',serif",fontStyle:"italic"}}>{allSubmitted?"All nominations are in.":"Some nominations are in."} Screen each director's scene:</p>
              <div className="row">
                {directors.filter(function(d){return submissions[d.id]!=null;}).map(function(d){return(
                  <button key={d.id} className="btn" style={{background:d.color,color:"#fff"}} onClick={function(){setWatchingTeam(d.id);}}>
                    {scored[d.id]?"✓ ":""}▶ {d.name}
                  </button>
                );})}
              </div>
              {directors.some(function(d){return scored[d.id];})&&!allScored&&(
                <p style={{color:"#555",fontSize:".82rem"}}>Still to screen: {directors.filter(function(d){return !scored[d.id];}).map(function(d){return d.name;}).join(", ")}</p>
              )}
            </div>
          )
        )}

        {/* Dispute */}
        {disputeState&&(function(){
          const d=directors.find(function(x){return x.id===disputeState.teamId;});
          const sub=submissions[disputeState.teamId];
          return(
            <div style={{background:"#111",border:"1.5px solid #333",borderRadius:14,padding:"1.5rem",maxWidth:600,width:"100%"}}>
              <p style={{color:"#aaa",fontSize:".82rem",marginBottom:"1rem",textAlign:"center"}}>
                Toggle off cards <strong style={{color:d.color}}>{d.name}</strong> didn't cover
              </p>
              <div className="dispute-cards">
                {(sub.cards||[]).map(function(ci,idx){return(
                  <div key={idx} className={"dispute-card "+(disputeState.cards[idx]?"on":"off")} onClick={function(){setDisputeState(function(ds){var c=[...ds.cards];c[idx]=!c[idx];return Object.assign({},ds,{cards:c});});}}>
                    {round.cards[ci]}
                  </div>
                );})}
              </div>
              <div className="row" style={{marginTop:"1rem"}}>
                <button className="btn btn-green" onClick={confirmDispute}>Confirm ({disputeState.cards.filter(Boolean).length} pts)</button>
                <button className="btn btn-outline" onClick={function(){setShowCoin(true);}}>🪙 Coin Flip</button>
                <button className="btn btn-gray" onClick={function(){setDisputeState(null);}}>Cancel</button>
              </div>
            </div>
          );
        })()}

        {/* Next round */}
        {allScored&&!gameOver&&(
          <div style={{textAlign:"center"}}>
            <p style={{color:"#888",marginBottom:"1rem",fontFamily:"'Playfair Display',serif",fontStyle:"italic"}}>
              Round {cur+1} complete — {directors.map(function(d){return d.name+" +"+(scores[d.id]||0);}).join(" · ")}
            </p>
            <button className="btn btn-gold btn-lg" onClick={nextRound}>Next Round →</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════ ROUTER ══════════════════════════════════ */
function App(){
  const hash=window.location.hash;
  const isPlayer=hash.startsWith("#player")||hash==="#join";
  return isPlayer?<PlayerApp/>:<HostApp/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
