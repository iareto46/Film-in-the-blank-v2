body{background:#0a0a0a;color:#f5f5f5;font-family:'DM Sans',sans-serif;min-height:100vh;}

.btn:hover{opacity:.85;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:#f59e0b;color:#000;}.btn-green{background:#16a34a;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}.btn-gray{background:#333;color:#eee;}

.spinner{display:inline-block;width:18px;height:18px;border:2px solid #444;border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.dot-live{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;background:#16a34a;animation:pulse 1.5s infinite;}

.waiting-directors{color:#555;font-style:italic;font-size:.9rem;text-align:center;}
.announce-wrap{text-align:center;max-width:760px;width:100%;}
.curtain-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1.15rem;color:#aaa;letter-spacing:1px;margin-bottom:.6rem;}

.dispute-cards{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
.dispute-card{padding:.5rem .9rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:500;user-select:none;transition:all .15s;}

.winner-name{font-family:'Bebas Neue',sans-serif;letter-spacing:4px;color:#f59e0b;opacity:0;transform:scale(.8);transition:opacity .8s ease,transform .8s ease;}
.winner-name.visible{opacity:1;transform:scale(1);}
.winner-applause{font-size:2rem;margin-top:.8rem;opacity:0;transition:opacity .5s ease .8s;}
.winner-applause.visible{opacity:1;}
.final-scores{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;margin:1.2rem 0;}
.final-score{text-align:center;}
.final-score-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;}
.final-score-label{font-size:.8rem;color:#777;text-transform:uppercase;letter-spacing:1px;}
.coin{font-size:3rem;display:block;text-align:center;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#111;border:1.5px solid #333;border-radius:20px;padding:2.5rem 3rem;text-align:center;max-width:360px;width:90%;}
.player-page{min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;}
.player-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;color:#fff;margin-bottom:.3rem;text-align:center;}
.player-logo span{color:#f59e0b;}
.player-sub{font-size:.75rem;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:2px;color:#f59e0b;text-transform:uppercase;display:block;text-align:center;margin-bottom:1.5rem;}
.color-picker{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin:.5rem 0;}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}
.player-card-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;background:#1a1a1a;border-radius:10px;cursor:pointer;border:1.5px solid transparent;margin-bottom:.5rem;transition:all .15s;}
.player-card-num{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#f59e0b;width:22px;text-align:center;}
.player-card-text{font-size:.88rem;color:#ddd;}
.pin-input{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:8px;text-align:center;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#f59e0b;width:100%;padding:.6rem;outline:none;}
.pin-input:focus{border-color:#f59e0b;}
.nomination-header{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:#888;margin-bottom:.8rem;text-align:center;line-height:1.5;}
.nomination-cards{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1rem;}
.nomination-card-tag{padding:.25rem .7rem;border-radius:999px;font-size:.78rem;font-weight:600;background:#1a1a1a;border:1px solid #333;color:#f59e0b;}
.timer-bar-wrap{width:100%;max-width:500px;background:#1a1a1a;border-radius:6px;height:10px;overflow:hidden;margin:.3rem 0;}
.timer-bar{height:100%;border-radius:6px;transition:width 1s linear,background .5s;}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:3px;text-align:center;line-height:1;}
.timer-alert{border-radius:12px;padding:.7rem 1.5rem;text-align:center;margin-bottom:.5rem;}
.timer-alert-text{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;}
</style>

<script>
(function(){
'use strict';
var h=React.createElement;
var useState=React.useState;
var useEffect=React.useEffect;
var useRef=React.useRef;
var useCallback=React.useCallback;

var CARD_CATEGORIES={
  "Genre":["Comedy","Drama","Horror","Action","Romance","Animated","Sci-Fi","Documentary","Musical","Thriller"],
  "Setting":["Takes place in the forest","Takes place at night","Takes place in winter","Takes place in a city","Takes place in space","Takes place at school","Takes place in a kitchen","Takes place on a boat","Takes place in a hospital","Takes place in a car","Takes place on another planet","Takes place in the past","Takes place in an office","Takes place in a restaurant"],
  "Scene Type":["Has a car chase","Has a wedding","Has a funeral","Has a dance scene","Has a courtroom scene","Has a heist","Has a chase on foot","Has a montage","Has a dream sequence","Has a party","Has a fight","Has a monologue","Has an epic entrance","Has a plot twist","Has a standoff"],
  "Actor/Actress":["With Brad Pitt","With Meryl Streep","With Tom Hanks","With Leonardo DiCaprio","With Cate Blanchett","With Denzel Washington","With Jennifer Lawrence","With Morgan Freeman","With Scarlett Johansson","With Will Smith","With Matt Damon","With Margot Robbie","With Zoe Saldana","With Dwayne Johnson","With Robin Williams","With Daniel Day-Lewis","With Sandra Bullock","With Adam Sandler","With Natalie Portman","With Nicole Kidman","With Tom Cruise"],
  "Objects":["Has a lawnmower","Has a dog","Has a gun","Has a cake","Has a ladder","Has a phone call","Has a mirror","Has a briefcase","Has a sword","Has a newspaper","Has a talking animal","Has a unique weapon","Has a baby","Has a mask"],
  "Miscellaneous":["Breaks the fourth wall","Is a Disney Channel Original Movie","Is a Christmas film","Is part of a musical","Has a famous quote","Is in black and white","Has no dialogue","Directed by Steven Spielberg","Directed by Christopher Nolan","Directed by Quentin Tarantino","Directed by James Cameron","Directed by Martin Scorsese"]
};
var CATEGORY_NAMES=Object.keys(CARD_CATEGORIES);

var PALETTE=[
  {hex:"#e53935",name:"Red"},{hex:"#1e88e5",name:"Blue"},{hex:"#43a047",name:"Green"},
  {hex:"#fb8c00",name:"Orange"},{hex:"#8e24aa",name:"Purple"},{hex:"#e91e63",name:"Pink"},
  {hex:"#00acc1",name:"Teal"},{hex:"#fdd835",name:"Yellow"},{hex:"#6d4c41",name:"Brown"},
  {hex:"#00897b",name:"Mint"},{hex:"#e64a19",name:"Crimson"},{hex:"#5c6bc0",name:"Indigo"}
];

var ROUND_SECONDS=120;

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function genPin(){return String(Math.floor(1000+Math.random()*9000));}
function hex2rgba(hex,a){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}catch(e){return hex;}}
function extractYouTubeId(url){try{var u=new URL(url);if(u.hostname.includes('youtu.be'))return u.pathname.slice(1).split('?')[0];return u.searchParams.get('v');}catch(e){return null;}}
function isYouTubeUrl(url){return /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)/.test(url);}

function generateRounds(){
  var pools={};
  CATEGORY_NAMES.forEach(function(cat){pools[cat]=shuffle(CARD_CATEGORIES[cat].slice());});
  var used={};
  CATEGORY_NAMES.forEach(function(cat){used[cat]=0;});
  return Array.from({length:5},function(_,i){
    var roundCats=shuffle(CATEGORY_NAMES.slice()).slice(0,5);
    var cards=roundCats.map(function(cat){
      var card=pools[cat][used[cat]%pools[cat].length];
      used[cat]++;
      return card;
    });
    return {round:i+1,cards:cards,submissions:{},scores:{},scored:{}};
  });
}

var PLAYER_KEY='fitb_cut_session';
function saveSession(pin,teamId,name,color){try{localStorage.setItem(PLAYER_KEY,JSON.stringify({pin:pin,teamId:teamId,name:name,color:color,savedAt:Date.now()}));}catch(e){}}
function loadSession(){try{var s=localStorage.getItem(PLAYER_KEY);if(!s)return null;var d=JSON.parse(s);if(Date.now()-d.savedAt>12*60*60*1000){localStorage.removeItem(PLAYER_KEY);return null;}return d;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem(PLAYER_KEY);}catch(e){}}
function getPinFromUrl(){var m=window.location.hash.match(/[?&]pin=(\d{4})/);return m?m[1]:null;}

function QRBlock(props){
  var url=props.url,size=props.size||160;
  var ref=useRef(null);
  useEffect(function(){
    if(!ref.current||!window.QRCode)return;
    ref.current.innerHTML='';
    new window.QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:window.QRCode.CorrectLevel.M});
  },[url,size]);
  return h('div',{style:{display:'inline-block',background:'#fff',borderRadius:12,padding:10,marginTop:'.6rem'}},h('div',{ref:ref}));
}

function Timer(props){
  var startedAt=props.startedAt;
  var sr=useState(ROUND_SECONDS);
  var secsLeft=sr[0],setSecsLeft=sr[1];
  useEffect(function(){
    if(!startedAt)return;
    function tick(){var elapsed=Math.floor((Date.now()-startedAt)/1000);setSecsLeft(Math.max(0,ROUND_SECONDS-elapsed));}
    tick();
    var id=setInterval(tick,500);
    return function(){clearInterval(id);};
  },[startedAt]);
  var mins=Math.floor(secsLeft/60);
  var secs=secsLeft%60;
  var pct=(secsLeft/ROUND_SECONDS)*100;
  var isWarning=secsLeft<=30,isUrgent=secsLeft<=10;
  var color=isUrgent?'#dc2626':isWarning?'#f59e0b':'#16a34a';
  var timeStr=mins+':'+(secs<10?'0':'')+secs;
  return h('div',{style:{width:'100%',maxWidth:500,textAlign:'center'}},
    isWarning&&h('div',{className:'timer-alert',style:{borderColor:isUrgent?'#dc2626':'#f59e0b',background:isUrgent?'rgba(220,38,38,.12)':'rgba(245,158,11,.1)',border:'1.5px solid'}},
      h('div',{className:'timer-alert-text',style:{color:isUrgent?'#f87171':'#f59e0b'}},isUrgent?'⚠️ Time is almost up!':'⏱ 30 seconds remaining!')),
    h('div',{className:'timer-display',style:{color:color}},timeStr),
    h('div',{className:'timer-bar-wrap'},h('div',{className:'timer-bar',style:{width:pct+'%',background:color}}))
  );
}

function CoinFlip(props){
  var onClose=props.onClose;
  var sr=useState(null),result=sr[0],setResult=sr[1];
  var sf=useState(false),flipping=sf[0],setFlipping=sf[1];
  function flip(){setFlipping(true);setResult(null);setTimeout(function(){setResult(Math.random()<.5?'HEADS':'TAILS');setFlipping(false);},700);}
  return h('div',{className:'overlay'},
    h('div',{className:'modal'},
      h('p',{style:{color:'#aaa',fontSize:'.8rem',textTransform:'uppercase',letterSpacing:2,marginBottom:'1rem'}},'Coin Flip'),
      flipping&&h('span',{className:'coin'},'🪙'),
      result&&h('div',null,h('span',{className:'coin'},'🪙'),h('p',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'2.5rem',color:'#f59e0b',letterSpacing:3}},result)),
      !result&&!flipping&&h('div',{style:{height:70,display:'flex',alignItems:'center',justifyContent:'center',color:'#555'}},'Press flip!'),
      h('div',{className:'row',style:{marginTop:'1.2rem'}},
        h('button',{className:'btn btn-gold',onClick:flip},'Flip!'),
        h('button',{className:'btn btn-gray',onClick:onClose},'Close')
      )
    )
  );
}

function CardAnnouncement(props){
  var cards=props.cards,onDone=props.onDone;
  var sr=useState([]),revealed=sr[0],setRevealed=sr[1];
  var sa=useState(false),showAre=sa[0],setShowAre=sa[1];
  useEffect(function(){
    var timers=[];
    cards.forEach(function(_,i){timers.push(setTimeout(function(){setRevealed(function(r){return r.includes(i)?r:r.concat([i]);});},(i+1)*900));});
    timers.push(setTimeout(function(){setShowAre(true);},(cards.length+1)*900));
    timers.push(setTimeout(function(){onDone&&onDone();},(cards.length+2)*900+400));
    return function(){timers.forEach(clearTimeout);};
  },[]);
  return h('div',{className:'announce-wrap'},
    h('div',{className:'curtain-label'},'🎬 Round Announcement'),
    h('div',{className:'divider'}),
    h('div',{className:'announce-title'},'The Nominees for'),
    h('div',{className:'announce-title'},h('span',null,'Best Movie Scene')),
    h('div',{className:'featuring-label'},'featuring…'),
    h('div',{className:'cards-reveal'},
      cards.map(function(c,i){return h('div',{key:i,className:'reveal-card'+(revealed.includes(i)?' visible':'')},
        h('span',{className:'reveal-card-num'},i+1),h('span',null,c));})
    ),
    h('div',{className:'are-label'+(showAre?' visible':'')},'…are'),
    showAre&&h('div',{style:{marginTop:'1rem'}},h('button',{className:'btn btn-outline',onClick:onDone,style:{fontSize:'.75rem'}},'Skip →'))
  );
}

function WinnerReveal(props){
  var winners=props.winners,allDirectors=props.allDirectors,totalScores=props.totalScores,onPlayAgain=props.onPlayAgain;
  var ss=useState(0),step=ss[0],setStep=ss[1];
  useEffect(function(){
    var t1=setTimeout(function(){setStep(1);},1800);
    var t2=setTimeout(function(){setStep(2);},3400);
    var t3=setTimeout(function(){setStep(3);},5200);
    return function(){clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  var isTie=winners.length>1;
  return h('div',{className:'winner-screen'},
    h('div',{className:'winner-envelope',style:{opacity:step>=1?.25:1,transition:'opacity .8s'}},'— And the award for Best Director is… —'),
    step>=1&&h('div',{className:'winner-award'},'🏆 Best Director 🏆'),
    h('div',{className:'winner-name'+(step>=2?' visible':''),style:{fontSize:isTie?'3rem':'4.5rem'}},
      isTie?winners.map(function(w){return w.name;}).join(' & '):winners[0].name),
    h('div',{className:'winner-applause'+(step>=2?' visible':'')},'🎬 🎉 🏆'),
    step>=3&&h('div',null,
      h('div',{className:'divider',style:{margin:'1.5rem auto'}}),

/* ══ PLAYER ══ */
function PlayerApp(){
  var ss=useState('loading');var screen=ss[0],setScreen=ss[1];
  var sp=useState('');var pin=sp[0],setPin=sp[1];
  var spi=useState('');var pinInput=spi[0],setPinInput=spi[1];
  var sg=useState(null);var game=sg[0],setGame=sg[1];
  var st=useState(null);var teamId=st[0],setTeamId=st[1];
  var sn=useState('');var teamName=sn[0],setTeamName=sn[1];
  var sc=useState(PALETTE[0].hex);var teamColor=sc[0],setTeamColor=sc[1];
  var se=useState('');var error=se[0],setError=se[1];
  var sb=useState(false);var busy=sb[0],setBusy=sb[1];
  var sl=useState('');var link=sl[0],setLink=sl[1];
  var ssc=useState('');var scene=ssc[0],setScene=ssc[1];
  var ssel=useState([]);var selected=ssel[0],setSelected=ssel[1];
  var ssu=useState(false);var submitted=ssu[0],setSubmitted=ssu[1];
  var ser=useState('');var submitError=ser[0],setSubmitError=ser[1];
  var ssy=useState(false);var syncing=ssy[0],setSyncing=ssy[1];
  var roundRef=useRef(null);
  var unsubRef=useRef(null);

  function subscribeGame(p){
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=dbSub('games/'+p,function(g){
      if(!g||g.terminated){clearSession();setScreen('pin');setPinInput('');setPin('');setTeamId(null);setGame(null);return;}
      setGame(g);
      if(g.status==='started')setScreen('game');
      if(g.status==='lobby')setScreen('lobby');
    });
  }

  useEffect(function(){
    (async function(){
      try{
        var session=loadSession();
        if(session){
          var g=await dbGet('games/'+session.pin);
          if(g&&!g.terminated&&(g.status==='lobby'||g.status==='started')&&g.teams&&g.teams[session.teamId]){
            setPin(session.pin);setTeamId(session.teamId);setTeamName(session.name);setTeamColor(session.color);
            setGame(g);setScreen(g.status==='started'?'game':'lobby');subscribeGame(session.pin);return;
          }
          clearSession();
        }
        var urlPin=getPinFromUrl();
        if(urlPin){
          setPinInput(urlPin);
          var g2=await dbGet('games/'+urlPin);
          if(g2&&g2.status==='lobby'){
            var dirs=g2.teams?Object.values(g2.teams):[];
            if(dirs.length<8){setPin(urlPin);setGame(g2);setScreen('join');return;}
          }
          setPinInput(urlPin);
        }
      }catch(e){console.warn(e);}
      setScreen('pin');
    })();
  },[]);

  useEffect(function(){
    if(!pin||!teamId)return;
    subscribeGame(pin);
    return function(){if(unsubRef.current)unsubRef.current();};
  },[pin,teamId]);

  useEffect(function(){
    if(!game)return;
    var r=game.currentRound;
    if(roundRef.current!==null&&roundRef.current!==r){
      setSubmitted(false);setSelected([]);setLink('');setScene('');setSubmitError('');
    }
    roundRef.current=r;
  },[game&&game.currentRound]);

  async function joinPin(){
    setError('');
    var p=pinInput.trim();
    if(p.length!==4||isNaN(Number(p))){setError('Enter the 4-digit PIN.');return;}
    setBusy(true);
    try{
      var g=await dbGet('games/'+p);
      if(!g){setError('Game not found.');setBusy(false);return;}
      if(g.status!=='lobby'){setError('This game has already started.');setBusy(false);return;}
      var dirs=g.teams?Object.values(g.teams):[];
      if(dirs.length>=8){setError('Game is full.');setBusy(false);return;}
      setPin(p);setGame(g);setScreen('join');
    }catch(e){setError('Could not connect. Try again.');}
    setBusy(false);
  }

  async function joinGame(){
    setError('');
    if(!teamName.trim()){setError('Please enter a director name.');return;}
    if(teamName.trim().length>20){setError('Name must be 20 characters or less.');return;}
    try{
      var g=await dbGet('games/'+pin);
      var existing=g&&g.teams?Object.values(g.teams):[];
      if(existing.find(function(t){return t.color===teamColor;})){setError('That color is taken!');return;}
      if(existing.find(function(t){return t.name.toLowerCase()===teamName.trim().toLowerCase();})){setError('That name is taken!');return;}
      setBusy(true);
      var pushRef=await dbPush('games/'+pin+'/teams',{name:teamName.trim(),color:teamColor,score:0});
      setTeamId(pushRef.key);
      saveSession(pin,pushRef.key,teamName.trim(),teamColor);
      setScreen('lobby');
    }catch(e){setError('Could not connect. Try again.');}
    setBusy(false);
  }

  async function submitScene(){
    setSubmitError('');
    if(!link.trim()){setSubmitError('Please paste a YouTube link.');return;}
    if(!isYouTubeUrl(link.trim())){setSubmitError('Only YouTube links are allowed!');return;}
    if(!extractYouTubeId(link.trim())){setSubmitError("Couldn't parse a video ID.");return;}
    if(selected.length===0){setSubmitError('Select at least one card.');return;}
    setSyncing(true);
    try{
      await dbSet('games/'+pin+'/rounds/'+game.currentRound+'/submissions/'+teamId,{
        link:link.trim(),scene:scene.trim()||'Untitled scene',cards:selected,teamName:teamName,teamColor:teamColor
      });
      setSubmitted(true);
    }catch(e){setSubmitError('Failed to submit. Try again.');}
    setSyncing(false);
  }

  if(screen==='loading')return h('div',{className:'player-page'},
    h('div',{className:'player-logo'},'Film ',h('span',null,'In'),' The Blank'),
    h('span',{className:'player-sub'},"Director's Cut"),
    h('span',{className:'spinner'})
  );

  if(screen==='pin')return h('div',{className:'player-page'},
    h('div',{className:'player-logo'},'Film ',h('span',null,'In'),' The Blank'),
    h('span',{className:'player-sub'},"Director's Cut"),
    h('div',{className:'card-surface'},
      h('p',{style:{color:'#777',fontSize:'.85rem',marginBottom:'1.2rem',textAlign:'center'}},'Enter the PIN shown on the host screen'),
      h('input',{className:'pin-input',value:pinInput,onChange:function(e){setPinInput(e.target.value.replace(/\D/g,'').slice(0,4));},placeholder:'0000',maxLength:4,inputMode:'numeric',onKeyDown:function(e){if(e.key==='Enter')joinPin();}}),
      error&&h('p',{className:'error-msg',style:{textAlign:'center',marginTop:'.5rem'}},error),
      h('button',{className:'btn btn-gold btn-lg',style:{width:'100%',marginTop:'1rem'},onClick:joinPin,disabled:busy||pinInput.length!==4},busy?'Checking…':'Join Game →')
    )
  );

  if(screen==='join')return h('div',{className:'player-page'},
    h('div',{className:'player-logo'},'Film ',h('span',null,'In'),' The Blank'),
    h('span',{className:'player-sub'},"Director's Cut"),
    h('div',{className:'card-surface'},
      h('p',{style:{color:'#777',fontSize:'.85rem',marginBottom:'1rem',textAlign:'center'}},'Create your director'),
      h('div',{className:'input-group'},
        h('label',{className:'input-label'},'Director Name'),
        h('input',{className:'input-field',value:teamName,onChange:function(e){setTeamName(e.target.value);},placeholder:'e.g. Spielberg Jr.',maxLength:20})
      ),
      h('div',{className:'input-group'},
        h('label',{className:'input-label'},'Your Color'),
        h('div',{className:'color-picker'},
          PALETTE.map(function(p){
            var taken=game&&game.teams?Object.values(game.teams).find(function(t){return t.color===p.hex;}):false;
            return h('div',{key:p.hex,className:'color-swatch'+(teamColor===p.hex?' selected':''),style:{background:p.hex,opacity:taken?.25:1,cursor:taken?'not-allowed':'pointer'},onClick:function(){if(!taken)setTeamColor(p.hex);},title:taken?p.name+' (taken)':p.name});
          })
        )
      ),
      error&&h('p',{className:'error-msg'},error),
      h('button',{className:'btn btn-gold btn-lg',style:{width:'100%',marginTop:'1rem'},onClick:joinGame,disabled:busy||!teamName.trim()},busy?'Joining…':'Enter the Room →')
    )
  );

  if(screen==='lobby'&&game)return h('div',{className:'player-page'},
    h('div',{className:'player-logo'},'Film ',h('span',null,'In'),' The Blank'),
    h('span',{className:'player-sub'},"Director's Cut"),
    h('div',{className:'card-surface',style:{textAlign:'center'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontStyle:'italic',color:'#888',fontSize:'.95rem',marginBottom:'.8rem'}},'Welcome to the screening room'),
      h('p',{style:{color:'#777',fontSize:'.85rem',marginBottom:'1rem'}},'Waiting for the host to call action…'),
      h('div',{style:{margin:'1rem 0'}},
        game.teams&&Object.values(game.teams).map(function(t,i){return h('div',{key:i,className:'director-row',style:{borderColor:hex2rgba(t.color,.4)}},
          h('div',{className:'director-swatch',style:{background:t.color}}),
          h('span',{className:'director-name',style:{color:t.color}},t.name),
          t.name===teamName&&h('span',{style:{marginLeft:'auto',fontSize:'.75rem',color:'#16a34a'}},'← You')
        );})),
      h('p',{style:{color:'#555',fontSize:'.8rem',marginBottom:'1rem'}},'PIN: ',h('strong',{style:{color:'#f59e0b',letterSpacing:2}},pin)),
      h('button',{className:'btn btn-outline',style:{fontSize:'.75rem'},onClick:function(){clearSession();setScreen('pin');setPinInput('');}},  'Leave Game')
    )
  );

  if(screen==='game'&&game){
    var round=game.rounds&&game.rounds[game.currentRound];
    if(!round)return h('div',{className:'player-page'},h('span',{className:'spinner'}));
    var myTeam=game.teams&&game.teams[teamId];
    var myColor=(myTeam&&myTeam.color)||teamColor||'#f59e0b';
    var alreadySubmitted=round.submissions&&round.submissions[teamId]!=null;

    if(alreadySubmitted||submitted)return h('div',{className:'player-page'},
      h('div',{style:{textAlign:'center',padding:'2rem'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontStyle:'italic',fontSize:'1rem',color:'#777',marginBottom:'.5rem'}},'Your nomination has been submitted'),
        h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'2.5rem',letterSpacing:2,color:myColor}},'Awaiting the Verdict'),
        h('p',{style:{color:'#555',marginTop:'.5rem',fontSize:'.85rem'}},'The host is reviewing all nominations…'),
        h('div',{style:{marginTop:'1.5rem'}},
          h('p',{style:{color:'#555',fontSize:'.78rem',marginBottom:'.5rem'}},'Your nominated cards:'),
          h('div',{className:'nomination-cards'},
            selected.map(function(i){return h('span',{key:i,className:'nomination-card-tag',style:{background:hex2rgba(myColor,.2),color:myColor,borderColor:hex2rgba(myColor,.3)}},round.cards[i]);}))
        )
      )
    );

    return h('div',{className:'player-page'},
      h('div',{style:{color:myColor,fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.6rem',letterSpacing:2,marginBottom:'.3rem'}},myTeam?myTeam.name:'Your Director'),
      h('div',{className:'card-surface'},
        h('div',{className:'nomination-header'},'Submit your nomination for ',h('strong',{style:{color:'#f5f5f5'}},'Best Movie Scene'),' featuring:'),
        h('div',{className:'nomination-cards'},round.cards.map(function(c,i){return h('span',{key:i,className:'nomination-card-tag'},c);})),
        h('p',{style:{fontSize:'.78rem',color:'#555',marginBottom:'.6rem'}},'Tap the cards your scene covers:'),
        round.cards.map(function(c,i){
          var sel=selected.includes(i);
          return h('div',{key:i,className:'player-card-item',onClick:function(){setSelected(function(s){return s.includes(i)?s.filter(function(x){return x!==i;}):[].concat(s,[i]);});},style:{background:sel?hex2rgba(myColor,.15):'#1a1a1a',borderColor:sel?myColor:'transparent'}},
            h('span',{className:'player-card-num'},i+1),

  return h('div',{className:'player-page'},h('span',{className:'spinner'}));

/* ══ HOST ══ */
function HostApp(){
  var sg=useState(null);var game=sg[0],setGame=sg[1];
  var spi=useState(null);var pin=spi[0],setPin=spi[1];
  var sl=useState(true);var loading=sl[0],setLoading=sl[1];
  var sc=useState(false);var showCoin=sc[0],setShowCoin=sc[1];
  var sd=useState(null);var disputeState=sd[0],setDisputeState=sd[1];
  var sw=useState(null);var watchingTeam=sw[0],setWatchingTeam=sw[1];
  var sa=useState(false);var announcing=sa[0],setAnnouncing=sa[1];
  var pinRef=useRef(null);

  var subscribeGame=useCallback(function(p){
    dbSub('games/'+p,function(fresh){
      if(!fresh)return;
      setGame(Object.assign({},fresh));
    });
  },[]);

  useEffect(function(){
    (async function(){
      try{
        var savedPin=localStorage.getItem('fitb_cut_host_pin');
        if(savedPin){
          var g=await dbGet('games/'+savedPin);
          if(g&&!g.terminated){pinRef.current=savedPin;setPin(savedPin);setLoading(false);subscribeGame(savedPin);return;}
        }
        var newPin=genPin();
        var rounds=generateRounds();
        await dbSet('games/'+newPin,{pin:newPin,status:'lobby',currentRound:0,totalScores:{},rounds:rounds,teams:{}});
        localStorage.setItem('fitb_cut_host_pin',newPin);
        pinRef.current=newPin;setPin(newPin);setLoading(false);subscribeGame(newPin);
      }catch(e){console.warn(e);setLoading(false);}
    })();
  },[]);

  async function resetGame(){
    if(pinRef.current)await dbUpdate('games/'+pinRef.current,{terminated:true});
    var newPin=genPin();
    var rounds=generateRounds();
    await dbSet('games/'+newPin,{pin:newPin,status:'lobby',currentRound:0,totalScores:{},rounds:rounds,teams:{}});
    localStorage.setItem('fitb_cut_host_pin',newPin);
    pinRef.current=newPin;setPin(newPin);
    setDisputeState(null);setWatchingTeam(null);setAnnouncing(false);
    subscribeGame(newPin);
  }

  async function startGame(){
    setAnnouncing(true);
    await dbUpdate('games/'+pinRef.current,{status:'started',currentRound:0});
  }

  async function awardPoints(teamId,pts){
    var cur=game.currentRound;
    var prev=(game.totalScores&&game.totalScores[teamId])||0;
    var su={};su[teamId]=pts;
    var sc2={};sc2[teamId]=true;
    var ts={};ts[teamId]=prev+pts;
    await dbUpdate('games/'+pinRef.current+'/rounds/'+cur+'/scores',su);
    await dbUpdate('games/'+pinRef.current+'/rounds/'+cur+'/scored',sc2);
    await dbUpdate('games/'+pinRef.current+'/totalScores',ts);
    setWatchingTeam(null);
  }

  async function skipRound(){
    var cur=game.currentRound;
    var directors=game.teams?Object.entries(game.teams).map(function(e){return Object.assign({id:e[0]},e[1]);}):[];
    var scored=(game.rounds&&game.rounds[cur]&&game.rounds[cur].scored)||{};
    for(var i=0;i<directors.length;i++){
      var d=directors[i];
      if(!scored[d.id]){
        var prev=(game.totalScores&&game.totalScores[d.id])||0;
        var su={};su[d.id]=0;var sc2={};sc2[d.id]=true;var ts={};ts[d.id]=prev;
        await dbUpdate('games/'+pinRef.current+'/rounds/'+cur+'/scores',su);
        await dbUpdate('games/'+pinRef.current+'/rounds/'+cur+'/scored',sc2);
        await dbUpdate('games/'+pinRef.current+'/totalScores',ts);
      }
    }
    await dbUpdate('games/'+pinRef.current,{currentRound:cur+1});
    setDisputeState(null);setWatchingTeam(null);setAnnouncing(true);
  }

  async function confirmDispute(){
    if(!disputeState)return;
    await awardPoints(disputeState.teamId,disputeState.cards.filter(Boolean).length);
    setDisputeState(null);
  }

  async function nextRound(){
    var cur=game.currentRound;
    await dbUpdate('games/'+pinRef.current,{currentRound:cur+1});
    setDisputeState(null);setWatchingTeam(null);setAnnouncing(true);
  }

  var logoEl=h('a',{href:'index.html',className:'logo',style:{textDecoration:'none'}},'Film ',h('span',null,'In'),' The Blank',h('small',{className:'logo-sub'},"Director's Cut"));

  if(loading)return h('div',{className:'page'},h('div',{className:'header'},logoEl),h('div',{className:'main'},h('span',{className:'spinner'}),' Setting up…'));
  if(!game)return h('div',{className:'page'},h('div',{className:'header'},logoEl),h('div',{className:'main'},h('span',{className:'spinner'}),' Connecting…'));

  var directors=game.teams?Object.entries(game.teams).map(function(e){return Object.assign({id:e[0]},e[1]);}):[];
  var baseUrl=window.location.href.split('?')[0].replace(/#.*/,'');
  var cur=game.currentRound;
  var round=game.rounds&&game.rounds[cur];
  var totalScores=game.totalScores||{};

  // LOBBY
  if(game.status==='lobby')return h('div',{className:'page'},
    h('div',{className:'header'},logoEl,h('button',{className:'btn btn-outline',onClick:resetGame,style:{fontSize:'.75rem'}},'New Game')),
    h('div',{className:'main'},
      h('div',{style:{textAlign:'center'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontStyle:'italic',color:'#777',fontSize:'1rem',marginBottom:'.8rem'}},'Welcome to the screening room'),
        h('p',{style:{color:'#555',fontSize:'.85rem',textTransform:'uppercase',letterSpacing:2,marginBottom:'.3rem'}},'Game PIN'),
        h('div',{className:'pin-display'},pin),
        h('p',{className:'pin-sub',style:{marginTop:'.6rem'}},'Scan to join'),
        h(QRBlock,{url:baseUrl+'#player?pin='+pin,size:160}),
        h('p',{style:{color:'#444',fontSize:'.72rem',marginTop:'.5rem'}},'or visit ',h('span',{style:{color:'#f59e0b'}},baseUrl+'#player'),' and enter PIN ',h('span',{style:{color:'#f59e0b'}},pin))
      ),
      h('div',{style:{width:'100%',maxWidth:480}},
        h('p',{style:{color:'#555',fontSize:'.78rem',textTransform:'uppercase',letterSpacing:1,marginBottom:'.8rem',textAlign:'center'}},'Directors in the room ('+directors.length+'/8)'),
        directors.length===0
          ?h('p',{className:'waiting-directors'},'Waiting for directors to arrive…')
          :h('div',{className:'directors-grid'},directors.map(function(d){return h('div',{key:d.id,className:'director-row',style:{borderColor:hex2rgba(d.color,.4)}},
              h('div',{className:'director-swatch',style:{background:d.color}}),
              h('span',{className:'director-name',style:{color:d.color}},d.name));}))
      ),
      h('button',{className:'btn btn-gold btn-lg',onClick:startGame,disabled:directors.length<1,style:{minWidth:220}},directors.length<1?'Waiting for directors…':'🎬 Call Action →')
    )
  );

  // ANNOUNCEMENT
  if(announcing&&round&&round.cards)return h('div',{className:'page'},
    h('div',{className:'header'},logoEl,h('span',{className:'round-badge'},'Round '+(cur+1)+'/5')),
    h('div',{className:'main'},
      h(CardAnnouncement,{cards:round.cards,onDone:async function(){
        await dbUpdate('games/'+pinRef.current+'/rounds/'+cur,{timerStartedAt:Date.now()});
        setAnnouncing(false);
      }})
    )
  );

  if(!round)return h('div',{className:'page'},h('div',{className:'main'},h('span',{className:'spinner'})));

  var submissions=round.submissions||{};
  var scored=round.scored||{};
  var scores=round.scores||{};
  var anySubmitted=directors.some(function(d){return submissions[d.id]!=null;});
  var allSubmitted=directors.every(function(d){return submissions[d.id]!=null;});
  var allScored=directors.length>0&&directors.every(function(d){return scored[d.id];});
  var gameOver=cur>=4&&allScored;

  function getYTEmbed(url){var id=extractYouTubeId(url);return id?'https://www.youtube.com/embed/'+id+'?autoplay=1':null;}

  // WINNER
  if(gameOver){
    var sorted=directors.slice().sort(function(a,b){return (totalScores[b.id]||0)-(totalScores[a.id]||0);});
    var topScore=totalScores[sorted[0]&&sorted[0].id]||0;
    var winners=sorted.filter(function(d){return (totalScores[d.id]||0)===topScore;});
    return h('div',{className:'page'},
      h('div',{className:'header'},logoEl),
      h('div',{className:'main'},h(WinnerReveal,{winners:winners,allDirectors:sorted,totalScores:totalScores,onPlayAgain:resetGame}))
    );
  }

  return h('div',{className:'page'},
    showCoin&&h(CoinFlip,{onClose:function(){setShowCoin(false);}}),
    h('div',{className:'header'},
      logoEl,
      h('div',{className:'score-chips'},
        directors.map(function(d){return h('span',{key:d.id,className:'score-chip',style:{background:d.color}},d.name+': '+(totalScores[d.id]||0)+' pts');}),
        h('span',{className:'round-badge'},'Round '+(cur+1)+'/5')
      ),
      h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center'}},
        h('span',{style:{fontSize:'.68rem',color:'#16a34a'}},h('span',{className:'dot-live'}),'LIVE'),
        h('button',{className:'btn btn-outline',onClick:resetGame,style:{fontSize:'.75rem'}},'Reset')
      )
    ),
    h('div',{className:'main'},
      round.timerStartedAt&&!allScored&&h(Timer,{startedAt:round.timerStartedAt}),
      h('div',{className:'announce-wrap',style:{marginBottom:'-.5rem'}},
        h('div',{className:'curtain-label'},'🎬 Round '+(cur+1)+' — The nominees for ',h('span',{style:{fontFamily:"'Bebas Neue',sans-serif",fontStyle:'normal',color:'#f59e0b',letterSpacing:1}},'Best Movie Scene'),' featuring'),
        h('div',{className:'cards-reveal',style:{marginTop:'.4rem'}},
          round.cards.map(function(c,i){return h('div',{key:i,className:'reveal-card visible'},h('span',{className:'reveal-card-num'},i+1),h('span',null,c));})),
        h('div',{className:'are-label visible'},'…are')
      ),
      h('div',{className:'subs-grid'},
        directors.map(function(d){
          var sub=submissions[d.id];
          return h('div',{key:d.id,className:'sub-box',style:{borderColor:sub?hex2rgba(d.color,.5):'#222'}},
            h('div',{className:'sub-title',style:{color:d.color}},d.name,' ',sub?'✓':'',scored[d.id]&&h('span',{className:'scored-badge'},'+'+( scores[d.id]||0)+' pts')),
            sub?h('div',{style:{fontSize:'.82rem',color:'#aaa',fontFamily:"'Playfair Display',serif",fontStyle:'italic'}},'Nomination received')
               :h('div',{className:'sub-waiting'},'Awaiting nomination…')
          );
        })
      ),
      !allScored&&h('div',{style:{textAlign:'center'}},
        !allSubmitted&&h('div',null,
          h('p',{style:{color:'#333',fontSize:'.72rem',marginBottom:'.2rem'}},'PIN'),
          h('p',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'2rem',color:'#f59e0b',letterSpacing:6,marginBottom:'.8rem'}},pin)
        ),
        anySubmitted&&!allSubmitted&&h('div',{style:{marginTop:'.4rem'}},
          h('p',{style:{color:'#555',fontSize:'.78rem',marginBottom:'.5rem',fontFamily:"'Playfair Display',serif",fontStyle:'italic'}},'Still waiting on some directors…'),
          h('div',{className:'row'},
            h('button',{className:'btn btn-outline',style:{fontSize:'.78rem'},onClick:function(){setWatchingTeam(null);}},'▶ Start reviewing what\'s in'),
            cur<4&&h('button',{className:'btn btn-gray',style:{fontSize:'.78rem'},onClick:skipRound},'Skip Round →')
          )
        ),
        !anySubmitted&&cur<4&&h('button',{className:'btn btn-gray',style:{fontSize:'.75rem',marginTop:'.5rem'},onClick:skipRound},'Skip Round →')
      ),
      anySubmitted&&!allScored&&(
        watchingTeam?(function(){
          var d=directors.find(function(x){return x.id===watchingTeam;});
          var sub=submissions[watchingTeam];
          if(!d||!sub)return null;
          return h('div',{className:'video-area'},
            h('div',{className:'review-label',style:{color:d.color}},'Now screening: '+d.name),
            h('div',{style:{display:'flex',flexWrap:'wrap',gap:'.4rem',justifyContent:'center',marginBottom:'.8rem'}},
              (sub.cards||[]).map(function(ci){return h('span',{key:ci,style:{padding:'.2rem .7rem',borderRadius:999,fontSize:'.78rem',fontWeight:600,background:hex2rgba(d.color,.15),border:'1.5px solid '+hex2rgba(d.color,.4),color:d.color}},round.cards[ci]);})
            ),
            h('iframe',{src:getYTEmbed(sub.link),title:'Scene',allowFullScreen:true,allow:'autoplay'}),
            h('div',{className:'row',style:{marginTop:'1rem'}},
              !scored[watchingTeam]?h('div',{className:'row'},
                h('button',{className:'btn btn-green',onClick:function(){awardPoints(watchingTeam,(sub.cards||[]).length);}},'✓ Grant Full ('+( sub.cards||[]).length+' pts)'),
                h('button',{className:'btn btn-red',onClick:function(){setDisputeState({teamId:watchingTeam,cards:(sub.cards||[]).map(function(){return true;})});setWatchingTeam(null);}},'Dispute'),
                h('button',{className:'btn btn-outline',onClick:function(){setShowCoin(true);}},'🪙 Coin Flip'),
                h('button',{className:'btn btn-gray',onClick:function(){setWatchingTeam(null);}},'← Back')
              ):h('p',{style:{color:'#16a34a',fontWeight:600}},'+'+scores[watchingTeam]+' pts awarded!')
            )
          );
        })():h('div',{style:{textAlign:'center'}},
          h('p',{style:{color:'#888',fontFamily:"'Playfair Display',serif",fontStyle:'italic',marginBottom:'.8rem'}},allSubmitted?'All nominations are in.':'Some nominations are in.',' Screen each director\'s scene:'),
          h('div',{className:'row'},
            directors.filter(function(d){return submissions[d.id]!=null;}).map(function(d){return h('button',{key:d.id,className:'btn',style:{background:d.color,color:'#fff'},onClick:function(){setWatchingTeam(d.id);}},scored[d.id]?'✓ ':'',' ▶ '+d.name);})),
          directors.some(function(d){return scored[d.id];})&&!allScored&&h('p',{style:{color:'#555',fontSize:'.82rem',marginTop:'.5rem'}},'Still to screen: '+directors.filter(function(d){return !scored[d.id];}).map(function(d){return d.name;}).join(', '))
        )
      ),
      disputeState&&(function(){
        var d=directors.find(function(x){return x.id===disputeState.teamId;});
        var sub=submissions[disputeState.teamId];
        if(!d||!sub)return null;
        return h('div',{style:{background:'#111',border:'1.5px solid #333',borderRadius:14,padding:'1.5rem',maxWidth:600,width:'100%'}},
          h('p',{style:{color:'#aaa',fontSize:'.82rem',marginBottom:'1rem',textAlign:'center'}},'Toggle off cards ',h('strong',{style:{color:d.color}},d.name),' didn\'t cover'),
          h('div',{className:'dispute-cards'},
            (sub.cards||[]).map(function(ci,idx){return h('div',{key:idx,className:'dispute-card '+(disputeState.cards[idx]?'on':'off'),onClick:function(){setDisputeState(function(ds){var c=ds.cards.slice();c[idx]=!c[idx];return Object.assign({},ds,{cards:c});});}},round.cards[ci]);})),
          h('div',{className:'row',style:{marginTop:'1rem'}},
            h('button',{className:'btn btn-green',onClick:confirmDispute},'Confirm ('+disputeState.cards.filter(Boolean).length+' pts)'),
            h('button',{className:'btn btn-outline',onClick:function(){setShowCoin(true);}},'🪙 Coin Flip'),
            h('button',{className:'btn btn-gray',onClick:function(){setDisputeState(null);}},'Cancel')
          )
        );
      })(),
      allScored&&!gameOver&&h('div',{style:{textAlign:'center'}},
        h('p',{style:{color:'#888',marginBottom:'1rem',fontFamily:"'Playfair Display',serif",fontStyle:'italic'}},'Round '+(cur+1)+' complete — '+directors.map(function(d){return d.name+' +'+(scores[d.id]||0);}).join(' · ')),
        h('button',{className:'btn btn-gold btn-lg',onClick:nextRound},'Next Round →')
      )
    )
  );
}

function App(){
  var hash=window.location.hash;
  var isPlayer=hash.startsWith('#player')||hash==='#join';
  return isPlayer?h(PlayerApp,null):h(HostApp,null);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
})();
</script>
</body>
</html>
