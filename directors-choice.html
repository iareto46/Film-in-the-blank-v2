<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#f5f5f5;font-family:'DM Sans',sans-serif;min-height:100vh;}
.page{min-height:100vh;display:flex;flex-direction:column;background:#0a0a0a;}
.header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid #222;flex-shrink:0;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;color:#fff;text-decoration:none;}
.logo span{color:#f59e0b;}
.logo-sub{font-size:.8rem;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:2px;color:#f59e0b;text-transform:uppercase;display:block;line-height:1;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.8rem;}
.btn{padding:.6rem 1.4rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:#f59e0b;color:#000;}
.btn-green{background:#16a34a;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}
.btn-gray{background:#333;color:#eee;}
.btn-outline{background:transparent;border:1.5px solid #444;color:#eee;}
.btn-lg{font-size:1.1rem;padding:.8rem 2.2rem;border-radius:10px;}
.row{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;justify-content:center;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #444;border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.dot-live{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;background:#16a34a;animation:pulse 1.5s infinite;}

.input-field{width:100%;background:#1a1a1a;border:1.5px solid #333;border-radius:8px;color:#eee;font-family:'DM Sans',sans-serif;font-size:.95rem;padding:.7rem .9rem;outline:none;}
.input-field:focus{border-color:#555;}

.pin-display{font-family:'Bebas Neue',sans-serif;font-size:6rem;letter-spacing:12px;color:#f59e0b;line-height:1;text-align:center;}

.director-row{display:flex;align-items:center;gap:1rem;background:#111;border-radius:12px;padding:.85rem 1.2rem;border:1.5px solid #222;}
.director-swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
.director-name{font-weight:600;font-size:1rem;}
.waiting-directors{color:#555;font-style:italic;font-size:.9rem;text-align:center;}
.announce-wrap{text-align:center;max-width:700px;width:100%;}
.curtain-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:#aaa;margin-bottom:.5rem;}
.announce-title{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:3px;color:#f5f5f5;line-height:1.1;}
.announce-title span{color:#f59e0b;}
.featuring-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:#777;margin:.5rem 0;}
.divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#f59e0b,transparent);margin:.5rem auto;}
.big-card{background:#161616;border:2px solid #f59e0b;border-radius:20px;padding:2rem 3rem;text-align:center;display:inline-block;opacity:0;transform:scale(.9);transition:opacity .5s,transform .5s;}
.big-card.visible{opacity:1;transform:scale(1);}
.big-card-text{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:4px;color:#f59e0b;line-height:1;}
.are-label{font-family:'Playfair Display',serif;font-style:italic;font-size:1.4rem;color:#f59e0b;margin-top:.5rem;opacity:0;transition:opacity .6s;}
.are-label.visible{opacity:1;}
.subs-grid{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;width:100%;max-width:960px;}
.sub-box{flex:1;min-width:180px;background:#111;border-radius:14px;padding:1rem 1.2rem;border:1.5px solid #222;}

.score-chips{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
.score-chip{padding:.3rem .9rem;border-radius:999px;font-weight:600;font-size:.88rem;color:#fff;}
.round-badge{background:#222;color:#aaa;padding:.25rem .7rem;border-radius:6px;font-size:.8rem;}
.video-area{width:100%;max-width:800px;}
.video-area iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;}
.review-label{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;text-align:center;margin-bottom:.8rem;}
.vote-results{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:500px;}
.vote-result-row{display:flex;align-items:center;gap:.8rem;}
.vote-bar-wrap{flex:1;background:#1a1a1a;border-radius:4px;height:8px;overflow:hidden;}
.vote-bar{height:100%;border-radius:4px;transition:width .8s ease;}
.winner-screen{text-align:center;}
.winner-envelope{font-family:'Playfair Display',serif;font-style:italic;font-size:1.3rem;color:#aaa;margin-bottom:.5rem;}
.winner-award{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#f59e0b;margin-bottom:.8rem;}
.winner-name{font-family:'Bebas Neue',sans-serif;letter-spacing:4px;color:#f59e0b;opacity:0;transform:scale(.8);transition:opacity .8s ease,transform .8s ease;}
.winner-name.visible{opacity:1;transform:scale(1);}
.winner-applause{font-size:2rem;margin-top:.8rem;opacity:0;transition:opacity .5s ease .8s;}
.winner-applause.visible{opacity:1;}
.final-scores{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;margin:1.2rem 0;}
.final-score{text-align:center;}
.final-score-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;}
.final-score-label{font-size:.8rem;color:#777;text-transform:uppercase;letter-spacing:1px;}
.coin{font-size:3rem;display:block;text-align:center;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#111;border:1.5px solid #333;border-radius:20px;padding:2.5rem 3rem;text-align:center;max-width:360px;width:90%;}
.player-page{min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;}
.player-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;color:#fff;margin-bottom:1.5rem;text-align:center;}
.player-logo span{color:#f59e0b;}
.player-sub{font-family:'DM Sans',sans-serif;font-size:.8rem;color:#f59e0b;text-transform:uppercase;letter-spacing:2px;display:block;text-align:center;margin-top:-.5rem;margin-bottom:1.5rem;}
.color-picker{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin:.5rem 0;}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}
.pin-input{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:8px;text-align:center;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#f59e0b;width:100%;padding:.6rem;outline:none;}
.pin-input:focus{border-color:#f59e0b;}
.vote-btn{padding:.7rem 1rem;border-radius:12px;border:1.5px solid #2a2a2a;background:#161616;color:#eee;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;text-align:left;display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem;width:100%;transition:all .2s;}
.vote-btn:hover:not(:disabled){border-color:#444;}
.vote-btn.selected{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b;}
.vote-btn:disabled{opacity:.6;cursor:not-allowed;}
.scene-card{background:#161616;border:1.5px solid #333;border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:.6rem;display:flex;align-items:center;gap:.8rem;}
.scene-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#f59e0b;width:30px;text-align:center;flex-shrink:0;}
.scene-text{font-size:.9rem;color:#ddd;line-height:1.3;}
.category-grid{display:flex;flex-direction:column;gap:.5rem;width:100%;max-width:560px;max-height:300px;overflow-y:auto;}
.category-btn{padding:.6rem 1rem;border-radius:8px;border:1.5px solid #222;background:#111;color:#ddd;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;text-align:left;transition:all .15s;}
.category-btn:hover{border-color:#f59e0b;color:#f59e0b;}
.waiting-vote{text-align:center;padding:2rem;}
</style>

var _db=firebase.database();
function dbGet(p){return Promise.race([_db.ref(p).get().then(function(s){return s.exists()?s.val():null;}),new Promise(function(_,r){setTimeout(function(){r(new Error("timeout"));},8000);})]);}
function dbSet(p,v){return _db.ref(p).set(v);}
function dbUpdate(p,v){return _db.ref(p).update(v);}
function dbSub(p,cb){var r=_db.ref(p);r.on('value',function(s){cb(s.exists()?s.val():null);});return function(){r.off();};}
function dbPush(p,v){return _db.ref(p).push(v);}

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const SCENE_CATEGORIES=[
  "Fight Scene","Car Chase","Heist","Shootout","Escape Scene","Explosion Scene",
  "Sword Fight","Martial Arts Scene","Pursuit Scene","Battle Scene",
  "Crying Scene","Reunion Scene","Breakup Scene","Death Scene","Confession Scene",
  "Apology Scene","Rage Scene","Celebration Scene","Farewell Scene","Plot Twist Reveal",
  "Slapstick Scene","Awkward Scene","Mistaken Identity Scene","Drunk Scene","Prank Scene",
  "Courtroom Scene","Speech Scene","Negotiation Scene","Confrontation Scene","Betrayal Scene",
  "Redemption Scene","First Kiss Scene","Love Declaration Scene","Wedding Scene","Jealousy Scene",
  "Chase Scene","Hiding Scene","Cliffhanger Scene","Jump Scare Scene","Standoff Scene",
];

const PALETTE=[
  {hex:"#e53935",name:"Red"},{hex:"#1e88e5",name:"Blue"},{hex:"#43a047",name:"Green"},
  {hex:"#fb8c00",name:"Orange"},{hex:"#8e24aa",name:"Purple"},{hex:"#e91e63",name:"Pink"},
  {hex:"#00acc1",name:"Teal"},{hex:"#fdd835",name:"Yellow"},{hex:"#6d4c41",name:"Brown"},
  {hex:"#00897b",name:"Mint"},{hex:"#e64a19",name:"Crimson"},{hex:"#5c6bc0",name:"Indigo"},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function genPin(){return String(Math.floor(1000+Math.random()*9000));}
function generateRounds(){return Array.from({length:5},(_,i)=>({round:i+1,category:null,submissions:{},votes:{},scores:{},scored:false}));}
function hex2rgba(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}catch(e){return hex;}}
function extractYouTubeId(url){try{const u=new URL(url);if(u.hostname.includes("youtu.be"))return u.pathname.slice(1).split("?")[0];return u.searchParams.get("v");}catch(e){return null;}}
function isYouTubeUrl(url){return /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)/.test(url);}

const PLAYER_KEY="fitb_dc_session";
function saveSession(pin,teamId,name,color){try{localStorage.setItem(PLAYER_KEY,JSON.stringify({pin,teamId,name,color,savedAt:Date.now()}));}catch(e){}}
function loadSession(){try{const s=localStorage.getItem(PLAYER_KEY);if(!s)return null;const d=JSON.parse(s);if(Date.now()-d.savedAt>12*60*60*1000){localStorage.removeItem(PLAYER_KEY);return null;}return d;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem(PLAYER_KEY);}catch(e){}}
function getPinFromUrl(){const m=window.location.hash.match(/[?&]pin=(\d{4})/);return m?m[1]:null;}

function QRBlock({url,size}){
  const sz=size||160;
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.QRCode)return;
    ref.current.innerHTML="";
    new window.QRCode(ref.current,{text:url,width:sz,height:sz,colorDark:"#000",colorLight:"#fff",correctLevel:window.QRCode.CorrectLevel.M});
  },[url,sz]);
  return <div style={{display:"inline-block",background:"#fff",borderRadius:12,padding:10,marginTop:".6rem"}}><div ref={ref}/></div>;
}

function CoinFlip({onClose}){
  const [result,setResult]=useState(null);
  const [flipping,setFlipping]=useState(false);
  const flip=()=>{setFlipping(true);setResult(null);setTimeout(()=>{setResult(Math.random()<.5?"HEADS":"TAILS");setFlipping(false);},700);};
  return(
    <div className="overlay">
      <div className="modal">
        <p style={{color:"#aaa",fontSize:".8rem",textTransform:"uppercase",letterSpacing:2,marginBottom:"1rem"}}>Coin Flip</p>
        {flipping&&<span className="coin">🪙</span>}
        {result&&<div><span className="coin">🪙</span><p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.5rem",color:"#f59e0b",letterSpacing:3}}>{result}</p></div>}
        {!result&&!flipping&&<div style={{height:70,display:"flex",alignItems:"center",justifyContent:"center",color:"#555"}}>Press flip!</div>}
        <div className="row" style={{marginTop:"1.2rem"}}>
          <button className="btn btn-gold" onClick={flip}>Flip!</button>
          <button className="btn btn-gray" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function CardAnnouncement({category,onDone}){
  const [vis,setVis]=useState(false);
  const [showAre,setShowAre]=useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setVis(true),800);
    const t2=setTimeout(()=>setShowAre(true),1800);
    const t3=setTimeout(()=>onDone&&onDone(),3000);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div className="announce-wrap">
      <div className="curtain-label">🎬 Round Announcement</div>
      <div className="divider"/>
      <div className="announce-title">The nominees for</div>
      <div className="announce-title">Best <span>Movie Scene</span></div>
      <div className="featuring-label">featuring…</div>
      <div style={{margin:"1.2rem 0"}}>
        <div className={"big-card"+(vis?" visible":"")}>
          <div className="big-card-text">{category}</div>
        </div>
      </div>
      <div className={"are-label"+(showAre?" visible":"")}>…are</div>
      {showAre&&<div style={{marginTop:"1rem"}}><button className="btn btn-outline" onClick={onDone} style={{fontSize:".75rem"}}>Skip →</button></div>}
    </div>
  );
}

function WinnerReveal({winners,allDirectors,totalScores,onPlayAgain}){
  const [step,setStep]=useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setStep(1),1800);
    const t2=setTimeout(()=>setStep(2),3400);
    const t3=setTimeout(()=>setStep(3),5200);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  const isTie=winners.length>1;
  return(
    <div className="winner-screen">
      <div className="winner-envelope" style={{opacity:step>=1?.25:1,transition:"opacity .8s"}}>— And the award for Best Director is… —</div>
      {step>=1&&<div className="winner-award">🏆 Best Director 🏆</div>}
      <div className={"winner-name"+(step>=2?" visible":"")} style={{fontSize:isTie?"3rem":"4.5rem"}}>
        {isTie?winners.map(function(w){return w.name;}).join(" & "):winners[0].name}
      </div>
      <div className={"winner-applause"+(step>=2?" visible":"")}>🎬 🎉 🏆</div>
      {step>=3&&(
        <>
          <div className="divider" style={{margin:"1.5rem auto"}}/>
          <div className="final-scores">
            {allDirectors.map(function(d){return(
              <div key={d.id} className="final-score">
                <div className="final-score-num" style={{color:d.color}}>{totalScores[d.id]||0}</div>
                <div className="final-score-label">{d.name}</div>
              </div>
            );})}
          </div>
          <button className="btn btn-gold btn-lg" onClick={onPlayAgain} style={{marginTop:"1rem"}}>Play Again</button>
        </>
      )}
    </div>
  );
}

/* ══ PLAYER ══ */
function PlayerApp(){
  const [screen,setScreen]=useState("loading");
  const [pin,setPin]=useState("");
  const [pinInput,setPinInput]=useState("");
  const [game,setGame]=useState(null);
  const [teamId,setTeamId]=useState(null);
  const [teamName,setTeamName]=useState("");
  const [teamColor,setTeamColor]=useState(PALETTE[0].hex);
  const [error,setError]=useState("");
  const [busy,setBusy]=useState(false);
  const [link,setLink]=useState("");
  const [scene,setScene]=useState("");
  const [submitted,setSubmitted]=useState(false);
  const [submitError,setSubmitError]=useState("");
  const [syncing,setSyncing]=useState(false);
  const [myVote,setMyVote]=useState(null);
  const [voteSubmitted,setVoteSubmitted]=useState(false);
  const roundRef=useRef(null);
  const unsubRef=useRef(null);

  function subscribeGame(p){
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=dbSub("games_choice/"+p,function(g){
      if(!g)return;
      setGame(g);
      if(g.status==="lobby")setScreen("lobby");
      if(g.status==="started")setScreen("game");
    });
  }

  useEffect(()=>{
    (async function(){
      try{
        const session=loadSession();
        if(session){
          const g=await dbGet("games_choice/"+session.pin);
          if(g&&(g.status==="lobby"||g.status==="started")&&g.teams&&g.teams[session.teamId]){
            setPin(session.pin);setTeamId(session.teamId);setTeamName(session.name);setTeamColor(session.color);
            setGame(g);setScreen(g.status==="started"?"game":"lobby");
            subscribeGame(session.pin);return;
          }
          clearSession();
        }
        const urlPin=getPinFromUrl();
        if(urlPin){
          setPinInput(urlPin);
          const g=await dbGet("games_choice/"+urlPin);
          if(g&&g.status==="lobby"){
            const dirs=g.teams?Object.values(g.teams):[];
            if(dirs.length<8){setPin(urlPin);setGame(g);setScreen("join");return;}
          }
          setPinInput(urlPin);
        }
      }catch(e){console.warn(e);}
      setScreen("pin");
    })();
  },[]);

  useEffect(()=>{
    if(!pin||!teamId)return;
    subscribeGame(pin);
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[pin,teamId]);

  useEffect(()=>{
    if(!game)return;
    const r=game.currentRound;
    if(roundRef.current!==null&&roundRef.current!==r){
      setSubmitted(false);setLink("");setScene("");setSubmitError("");setMyVote(null);setVoteSubmitted(false);
    }
    roundRef.current=r;
  },[game&&game.currentRound]);

  const joinPin=async()=>{
    setError("");
    const p=pinInput.trim();
    if(p.length!==4||isNaN(Number(p))){setError("Enter the 4-digit PIN.");return;}
    setBusy(true);
    try{
      const g=await dbGet("games_choice/"+p);
      if(!g){setError("Game not found.");setBusy(false);return;}
      if(g.status!=="lobby"){setError("This game has already started.");setBusy(false);return;}
      const dirs=g.teams?Object.values(g.teams):[];
      if(dirs.length>=8){setError("Game is full.");setBusy(false);return;}
      setPin(p);setGame(g);setScreen("join");
    }catch(e){setError("Could not connect. Try again.");}
    setBusy(false);
  };

  const joinGame=async()=>{
    setError("");
    if(!teamName.trim()){setError("Please enter a director name.");return;}
    if(teamName.trim().length>20){setError("Name must be 20 characters or less.");return;}
    try{
      const g=await dbGet("games_choice/"+pin);
      const existing=g&&g.teams?Object.values(g.teams):[];
      if(existing.find(function(t){return t.color===teamColor;})){setError("That color is taken!");return;}
      if(existing.find(function(t){return t.name.toLowerCase()===teamName.trim().toLowerCase();})){setError("That name is taken!");return;}
      setBusy(true);
      const pushRef=await dbPush("games_choice/"+pin+"/teams",{name:teamName.trim(),color:teamColor});
      setTeamId(pushRef.key);
      saveSession(pin,pushRef.key,teamName.trim(),teamColor);
      setScreen("lobby");
    }catch(e){setError("Could not connect. Try again.");}
    setBusy(false);
  };

  const submitScene=async()=>{
    setSubmitError("");
    if(!link.trim()){setSubmitError("Please paste a YouTube link.");return;}
    if(!isYouTubeUrl(link.trim())){setSubmitError("Only YouTube links are allowed!");return;}
    if(!extractYouTubeId(link.trim())){setSubmitError("Couldn't parse a video ID.");return;}
    setSyncing(true);
    try{
      await dbSet("games_choice/"+pin+"/rounds/"+game.currentRound+"/submissions/"+teamId,{
        link:link.trim(),scene:scene.trim()||"Untitled scene",
        teamName:teamName,teamColor:teamColor,
      });
      setSubmitted(true);
    }catch(e){setSubmitError("Failed to submit. Try again.");}
    setSyncing(false);
  };

  const submitVote=async(votedForId)=>{
    if(voteSubmitted)return;
    setMyVote(votedForId);
    setVoteSubmitted(true);
    try{
      await dbSet("games_choice/"+pin+"/rounds/"+game.currentRound+"/votes/"+teamId,votedForId);
    }catch(e){console.warn("vote error",e);}
  };

  if(screen==="loading")return <div className="player-page"><div className="player-logo">Film <span>In</span> The Blank</div><span className="spinner"/></div>;

  if(screen==="pin")return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <span className="player-sub">Director's Choice</span>
      <div className="card-surface">
        <p style={{color:"#777",fontSize:".85rem",marginBottom:"1.2rem",textAlign:"center"}}>Enter the PIN shown on the host screen</p>
        <input className="pin-input" value={pinInput} onChange={function(e){setPinInput(e.target.value.replace(/\D/g,"").slice(0,4));}} placeholder="0000" maxLength={4} inputMode="numeric" onKeyDown={function(e){if(e.key==="Enter")joinPin();}}/>
        {error&&<p className="error-msg" style={{textAlign:"center",marginTop:".5rem"}}>{error}</p>}
        <button className="btn btn-gold btn-lg" style={{width:"100%",marginTop:"1rem"}} onClick={joinPin} disabled={busy||pinInput.length!==4}>
          {busy?"Checking…":"Join Game →"}
        </button>
      </div>
    </div>
  );

  if(screen==="join")return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <span className="player-sub">Director's Choice</span>
      <div className="card-surface">
        <p style={{color:"#777",fontSize:".85rem",marginBottom:"1rem",textAlign:"center"}}>Create your director</p>
        <div className="input-group">
          <label className="input-label">Director Name</label>
          <input className="input-field" value={teamName} onChange={function(e){setTeamName(e.target.value);}} placeholder="e.g. Spielberg Jr." maxLength={20}/>
        </div>
        <div className="input-group">
          <label className="input-label">Your Color</label>
          <div className="color-picker">
            {PALETTE.map(function(p){
              const taken=game&&game.teams?Object.values(game.teams).find(function(t){return t.color===p.hex;}):false;
              return <div key={p.hex} className={"color-swatch"+(teamColor===p.hex?" selected":"")} style={{background:p.hex,opacity:taken?.25:1,cursor:taken?"not-allowed":"pointer"}} onClick={function(){if(!taken)setTeamColor(p.hex);}} title={taken?p.name+" (taken)":p.name}/>;
            })}
          </div>
        </div>
        {error&&<p className="error-msg">{error}</p>}
        <button className="btn btn-gold btn-lg" style={{width:"100%",marginTop:"1rem"}} onClick={joinGame} disabled={busy||!teamName.trim()}>
          {busy?"Joining…":"Enter the Room →"}
        </button>
      </div>
    </div>
  );

  if(screen==="lobby"&&game)return(
    <div className="player-page">
      <div className="player-logo">Film <span>In</span> The Blank</div>
      <span className="player-sub">Director's Choice</span>
      <div className="card-surface" style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#888",fontSize:".95rem",marginBottom:".8rem"}}>Welcome to the screening room</div>
        <p style={{color:"#777",fontSize:".85rem",marginBottom:"1rem"}}>Waiting for the host to call action…</p>
        <div style={{margin:"1rem 0"}}>
          {game.teams&&Object.values(game.teams).map(function(t,i){return(
            <div key={i} className="director-row" style={{borderColor:hex2rgba(t.color,.4)}}>
              <div className="director-swatch" style={{background:t.color}}/>
              <span className="director-name" style={{color:t.color}}>{t.name}</span>
              {t.name===teamName&&<span style={{marginLeft:"auto",fontSize:".75rem",color:"#16a34a"}}>← You</span>}
            </div>
          );})}
        </div>
        <p style={{color:"#555",fontSize:".8rem",marginBottom:"1rem"}}>PIN: <strong style={{color:"#f59e0b",letterSpacing:2}}>{pin}</strong></p>
        <button className="btn btn-outline" style={{fontSize:".75rem"}} onClick={function(){clearSession();setScreen("pin");setPinInput("");}}>Leave Game</button>
      </div>
    </div>
  );

  if(screen==="game"&&game){
    const round=game.rounds&&game.rounds[game.currentRound];
    if(!round)return <div className="player-page"><span className="spinner"/>Loading round…</div>;
    const myTeam=game.teams&&game.teams[teamId];
    const myColor=(myTeam&&myTeam.color)||teamColor||"#f59e0b";
    const alreadySubmitted=round.submissions&&round.submissions[teamId]!=null;
    const votingOpen=round.votingOpen;
    const directors=game.teams?Object.entries(game.teams).map(function(e){return Object.assign({id:e[0]},e[1]);}):[];
    const allVoted=round.votes&&directors.every(function(d){return round.votes[d.id]!=null;});

    // Voting phase
    if(votingOpen){
      if(voteSubmitted||round.votes&&round.votes[teamId])return(
        <div className="player-page">
          <div style={{color:myColor,fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",letterSpacing:2,marginBottom:"1rem"}}>{myTeam?myTeam.name:"Your Director"}</div>
          <div className="waiting-vote">
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2rem",letterSpacing:2,color:myColor,marginBottom:".5rem"}}>Vote Cast!</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#666",fontSize:".9rem"}}>Waiting for all votes to come in…</div>
          </div>
        </div>
      );
      return(
        <div className="player-page">
          <div style={{color:myColor,fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",letterSpacing:2,marginBottom:".5rem"}}>{myTeam?myTeam.name:"Your Director"}</div>
          <div className="card-surface">
            <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:".9rem",color:"#888",textAlign:"center",marginBottom:"1rem"}}>
              Vote for your favorite <strong style={{color:"#f5f5f5",fontStyle:"normal"}}>{round.category}</strong>
            </div>
            {directors.filter(function(d){return d.id!==teamId&&round.submissions&&round.submissions[d.id];}).map(function(d){
              const sub=round.submissions[d.id];
              return(
                <button key={d.id} className={"vote-btn"+(myVote===d.id?" selected":"")} onClick={function(){submitVote(d.id);}} disabled={voteSubmitted}
                  style={{borderColor:myVote===d.id?d.color:"",background:myVote===d.id?hex2rgba(d.color,.12):""}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:d.color,flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:".8rem",fontWeight:600,color:myVote===d.id?d.color:"#eee"}}>{d.name}</div>
                    <div style={{fontSize:".72rem",color:"#666"}}>{sub.scene}</div>
                  </div>
                  {myVote===d.id&&<span style={{marginLeft:"auto",color:d.color}}>✓</span>}
                </button>
              );
            })}
            <p style={{color:"#444",fontSize:".75rem",textAlign:"center",marginTop:".5rem"}}>You can't vote for your own submission</p>
          </div>
        </div>
      );
    }

    // Submission phase
    if(alreadySubmitted||submitted)return(
      <div className="player-page">
        <div style={{textAlign:"center",padding:"2rem"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"1rem",color:"#777",marginBottom:".5rem"}}>Your nomination has been submitted</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.5rem",letterSpacing:2,color:myColor}}>Awaiting the Verdict</div>
          <p style={{color:"#555",marginTop:".5rem",fontSize:".85rem"}}>The host is screening all nominations…</p>
        </div>
      </div>
    );

    return(
      <div className="player-page">
        <div style={{color:myColor,fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.6rem",letterSpacing:2,marginBottom:".3rem"}}>{myTeam?myTeam.name:"Your Director"}</div>
        <div className="card-surface">
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:".95rem",color:"#888",marginBottom:".8rem",textAlign:"center"}}>
            Submit your favorite <strong style={{color:"#f5f5f5",fontStyle:"normal"}}>{round.category||"scene"}</strong>
          </div>
          <div className="input-group">
            <label className="input-label">YouTube Link</label>
            <input className="input-field" value={link} onChange={function(e){setLink(e.target.value);}} placeholder="https://youtube.com/watch?v=…"/>
          </div>
          <div className="input-group">
            <label className="input-label">Scene Description</label>
            <input className="input-field" value={scene} onChange={function(e){setScene(e.target.value);}} placeholder="e.g. Rocky vs Apollo — Rocky II"/>
          </div>
          {submitError&&<p className="error-msg">{submitError}</p>}
          <button className="btn btn-gold" style={{width:"100%",marginTop:".6rem",padding:".7rem"}} onClick={submitScene} disabled={syncing}>
            {syncing?"Submitting…":"🎬 Submit Nomination"}
          </button>
        </div>
      </div>
    );
  }

  return <div className="player-page"><span className="spinner"/>Connecting…</div>;
}

/* ══ HOST ══ */
function HostApp(){
  const [game,setGame]=useState(null);
  const [pin,setPin]=useState(null);
  const [loading,setLoading]=useState(true);
  const [showCoin,setShowCoin]=useState(false);
  const [announcing,setAnnouncing]=useState(false);
  const [watchingId,setWatchingId]=useState(null);
  const [showCategoryPicker,setShowCategoryPicker]=useState(false);
  const [categoryFilter,setCategoryFilter]=useState("");
  const pinRef=useRef(null);

  const subscribeGame=useCallback(function(p){
    dbSub("games_choice/"+p,function(fresh){
      if(!fresh)return;
      setGame(function(){return Object.assign({},fresh);});
    });
  },[]);

  useEffect(()=>{
    (async function(){
      try{
        let savedPin=localStorage.getItem("fitb_choice_host_pin");
        if(savedPin){
          const g=await dbGet("games_choice/"+savedPin);
          if(g){pinRef.current=savedPin;setPin(savedPin);setLoading(false);subscribeGame(savedPin);return;}
        }
        const newPin=genPin();
        const rounds=generateRounds();
        await dbSet("games_choice/"+newPin,{pin:newPin,status:"lobby",currentRound:0,totalScores:{},rounds:rounds,teams:{}});
        localStorage.setItem("fitb_choice_host_pin",newPin);
        pinRef.current=newPin;setPin(newPin);setLoading(false);subscribeGame(newPin);
      }catch(e){console.warn(e);setLoading(false);}
    })();
  },[]);

  const resetGame=async()=>{
    const newPin=genPin();
    const rounds=generateRounds();
    await dbSet("games_choice/"+newPin,{pin:newPin,status:"lobby",currentRound:0,totalScores:{},rounds:rounds,teams:{}});
    localStorage.setItem("fitb_choice_host_pin",newPin);
    pinRef.current=newPin;setPin(newPin);setAnnouncing(false);setWatchingId(null);setShowCategoryPicker(false);
    subscribeGame(newPin);
  };

  const startGame=async()=>{
    await dbUpdate("games_choice/"+pinRef.current,{status:"started",currentRound:0});
    setShowCategoryPicker(true);
  };

  const pickCategory=async(cat)=>{
    await dbUpdate("games_choice/"+pinRef.current+"/rounds/"+game.currentRound,{category:cat});
    setShowCategoryPicker(false);
    setAnnouncing(true);
  };

  const randomCategory=async()=>{
    const used=(game.rounds||[]).map(function(r){return r.category;}).filter(Boolean);
    const available=SCENE_CATEGORIES.filter(function(c){return !used.includes(c);});
    const cat=shuffle(available)[0]||shuffle(SCENE_CATEGORIES)[0];
    await pickCategory(cat);
  };

  const openVoting=async()=>{
    await dbUpdate("games_choice/"+pinRef.current+"/rounds/"+game.currentRound,{votingOpen:true});
    setWatchingId(null);
  };

  const closeVotingAndScore=async()=>{
    const cur=game.currentRound;
    const round=game.rounds[cur];
    const directors=game.teams?Object.entries(game.teams).map(function(e){return Object.assign({id:e[0]},e[1]);}):[];
    const votes=round.votes||{};
    // Count votes per director
    const voteCounts={};
    directors.forEach(function(d){voteCounts[d.id]=0;});
    Object.values(votes).forEach(function(votedForId){
      if(voteCounts[votedForId]!==undefined)voteCounts[votedForId]++;
    });
    // Find winner(s)
    const maxVotes=Math.max(...Object.values(voteCounts));
    // Award pts: 1pt per vote + 1 bonus for winning
    const newScores={};
    directors.forEach(function(d){
      const vpts=voteCounts[d.id]||0;
      const bonus=maxVotes>0&&voteCounts[d.id]===maxVotes?1:0;
      newScores[d.id]=vpts+bonus;
    });
    // Update total scores
    const totalUpdate={};
    directors.forEach(function(d){
      totalUpdate[d.id]=(game.totalScores&&game.totalScores[d.id]||0)+newScores[d.id];
    });
    await dbUpdate("games_choice/"+pinRef.current+"/rounds/"+cur,{votingOpen:false,voteCounts:voteCounts,roundScores:newScores,scored:true});
    await dbUpdate("games_choice/"+pinRef.current+"/totalScores",totalUpdate);
  };

  const nextRound=async()=>{
    const next=game.currentRound+1;
    await dbUpdate("games_choice/"+pinRef.current,{currentRound:next});
    setWatchingId(null);setAnnouncing(false);
    setShowCategoryPicker(true);
  };

  if(loading)return(
    <div className="page">
      <div className="header">
        <a href="index.html" className="logo">Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
      </div>
      <div className="main"><span className="spinner"/>Setting up…</div>
    </div>
  );
  if(!game)return(
    <div className="page">
      <div className="header">
        <a href="index.html" className="logo">Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
      </div>
      <div className="main"><span className="spinner"/>Connecting…</div>
    </div>
  );

  const directors=game.teams?Object.entries(game.teams).map(function(e){return Object.assign({id:e[0]},e[1]);}):[];
  const baseUrl=window.location.href.split("?")[0].replace(/#.*/,"");
  const cur=game.currentRound;
  const round=game.rounds&&game.rounds[cur];
  const totalScores=game.totalScores||{};

  // LOBBY
  if(game.status==="lobby")return(
    <div className="page">
      <div className="header">
        <a href="index.html" className="logo" style={{textDecoration:"none"}}>Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
        <button className="btn btn-outline" onClick={resetGame} style={{fontSize:".75rem"}}>New Game</button>
      </div>
      <div className="main">
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#777",fontSize:"1rem",marginBottom:".8rem"}}>Welcome to the screening room</div>
          <p style={{color:"#555",fontSize:".85rem",textTransform:"uppercase",letterSpacing:2,marginBottom:".3rem"}}>Game PIN</p>
          <div className="pin-display">{pin}</div>
          <p className="pin-sub" style={{marginTop:".6rem"}}>Scan to join</p>
          <QRBlock url={baseUrl+"#player?pin="+pin} size={160}/>
          <p style={{color:"#444",fontSize:".72rem",marginTop:".5rem"}}>or visit <span style={{color:"#f59e0b"}}>{baseUrl}#player</span> and enter PIN <span style={{color:"#f59e0b"}}>{pin}</span></p>
        </div>
        <div style={{width:"100%",maxWidth:480}}>
          <p style={{color:"#555",fontSize:".78rem",textTransform:"uppercase",letterSpacing:1,marginBottom:".8rem",textAlign:"center"}}>Directors in the room ({directors.length}/8)</p>
          {directors.length===0
            ?<p className="waiting-directors">Waiting for directors to arrive…</p>
            :<div className="directors-grid">
              {directors.map(function(d){return(
                <div key={d.id} className="director-row" style={{borderColor:hex2rgba(d.color,.4)}}>
                  <div className="director-swatch" style={{background:d.color}}/>
                  <span className="director-name" style={{color:d.color}}>{d.name}</span>
                </div>
              );})}
            </div>
          }
        </div>
        <button className="btn btn-gold btn-lg" onClick={startGame} disabled={directors.length<1} style={{minWidth:220}}>
          {directors.length<1?"Waiting for directors…":"🎬 Call Action →"}
        </button>
      </div>
    </div>
  );

  // GAME OVER
  const gameOver=cur>=4&&round&&round.scored;
  if(gameOver){
    const sorted=[...directors].sort(function(a,b){return (totalScores[b.id]||0)-(totalScores[a.id]||0);});
    const topScore=totalScores[sorted[0]&&sorted[0].id]||0;
    const winners=sorted.filter(function(d){return (totalScores[d.id]||0)===topScore;});
    return(
      <div className="page">
        <div className="header">
          <a href="index.html" className="logo" style={{textDecoration:"none"}}>Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
          <button className="btn btn-outline" onClick={resetGame} style={{fontSize:".75rem",visibility:"hidden"}}>New Game</button>
        </div>
        <div className="main">
          <WinnerReveal winners={winners} allDirectors={sorted} totalScores={totalScores} onPlayAgain={resetGame}/>
        </div>
      </div>
    );
  }

  // CATEGORY PICKER
  if(showCategoryPicker)return(
    <div className="page">
      <div className="header">
        <a href="index.html" className="logo" style={{textDecoration:"none"}}>Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
        <span className="round-badge">Round {cur+1}/5</span>
      </div>
      <div className="main">
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#aaa",fontSize:"1rem",marginBottom:".5rem"}}>Pick this round's scene category</div>
          <div className="divider"/>
        </div>
        <div className="row">
          <button className="btn btn-gold btn-lg" onClick={randomCategory}>🎲 Random Category</button>
          <span style={{color:"#555",fontSize:".85rem"}}>or pick one below</span>
        </div>
        <input
          className="input-field"
          style={{maxWidth:480}}
          placeholder="Search categories…"
          value={categoryFilter}
          onChange={function(e){setCategoryFilter(e.target.value);}}
        />
        <div className="category-grid">
          {SCENE_CATEGORIES.filter(function(c){return c.toLowerCase().includes(categoryFilter.toLowerCase());}).map(function(c){return(
            <button key={c} className="category-btn" onClick={function(){pickCategory(c);}}>{c}</button>
          );})}
        </div>
      </div>
    </div>
  );

  // ANNOUNCEMENT
  if(announcing&&round&&round.category)return(
    <div className="page">
      <div className="header">
        <a href="index.html" className="logo" style={{textDecoration:"none"}}>Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
        <span className="round-badge">Round {cur+1}/5</span>
      </div>
      <div className="main">
        <CardAnnouncement category={round.category} onDone={function(){setAnnouncing(false);}}/>
      </div>
    </div>
  );

  if(!round)return <div className="page"><div className="main"><span className="spinner"/></div></div>;

  const submissions=round.submissions||{};
  const votes=round.votes||{};
  const voteCounts=round.voteCounts||{};
  const roundScores=round.roundScores||{};
  const anySubmitted=directors.some(function(d){return submissions[d.id]!=null;});
  const allSubmitted=directors.every(function(d){return submissions[d.id]!=null;});
  const allVoted=directors.length>0&&directors.every(function(d){return votes[d.id]!=null;});
  const votingOpen=round.votingOpen;
  const roundScored=round.scored;

  function getYTEmbed(url){var id=extractYouTubeId(url);return id?"https://www.youtube.com/embed/"+id+"?autoplay=1":null;}

  return(
    <div className="page">
      {showCoin&&<CoinFlip onClose={function(){setShowCoin(false);}}/>}
      <div className="header">
        <a href="index.html" className="logo" style={{textDecoration:"none"}}>Film <span>In</span> The Blank<small className="logo-sub">Director's Choice</small></a>
        <div className="score-chips">
          {directors.map(function(d){return <span key={d.id} className="score-chip" style={{background:d.color}}>{d.name}: {totalScores[d.id]||0} pts</span>;})}
          <span className="round-badge">Round {cur+1}/5</span>
        </div>
        <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
          <span style={{fontSize:".68rem",color:"#16a34a"}}><span className="dot-live"/>LIVE</span>
          <button className="btn btn-outline" onClick={resetGame} style={{fontSize:".75rem"}}>Reset</button>
        </div>
      </div>

      <div className="main">
        {/* Category display */}
        <div className="announce-wrap" style={{marginBottom:"-.5rem"}}>
          <div className="curtain-label">🎬 Round {cur+1} — The nominees for <span style={{fontFamily:"'Bebas Neue',sans-serif",fontStyle:"normal",color:"#f59e0b",letterSpacing:1}}>Best Movie Scene</span> featuring</div>
          <div style={{margin:".6rem 0",textAlign:"center"}}>
            <div className="big-card visible" style={{padding:".8rem 2rem",display:"inline-flex"}}>
              <div className="big-card-text" style={{fontSize:"2rem"}}>{round.category}</div>
            </div>
          </div>
          <div className="are-label visible">…are</div>
        </div>

        {/* Submissions */}
        <div className="subs-grid">
          {directors.map(function(d){
            const sub=submissions[d.id];
            return(
              <div key={d.id} className="sub-box" style={{borderColor:sub?hex2rgba(d.color,.5):"#222"}}>
                <div className="sub-title" style={{color:d.color}}>
                  {d.name} {sub?"✓":""}
                  {roundScored&&<span className="scored-badge">+{roundScores[d.id]||0} pts</span>}
                </div>
                {sub
                  ?<div style={{fontSize:".82rem",color:"#aaa",fontFamily:"'Playfair Display',serif",fontStyle:"italic"}}>Nomination received</div>
                  :<div className="sub-waiting">Awaiting nomination…</div>
                }
              </div>
            );
          })}
        </div>

        {/* PIN reminder */}
        {!anySubmitted&&(
          <div style={{textAlign:"center"}}>
            <p style={{color:"#333",fontSize:".72rem",marginBottom:".2rem"}}>PIN</p>
            <p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2rem",color:"#f59e0b",letterSpacing:6}}>{pin}</p>
          </div>
        )}

        {/* Screening phase */}
        {anySubmitted&&!votingOpen&&!roundScored&&(
          watchingId?(function(){
            const d=directors.find(function(x){return x.id===watchingId;});
            const sub=submissions[watchingId];
            if(!sub||!d)return null;
            return(
              <div className="video-area">
                <div className="review-label" style={{color:d.color}}>Now screening: {d.name}</div>
                <div style={{color:"#666",fontSize:".8rem",fontFamily:"'Playfair Display',serif",fontStyle:"italic",textAlign:"center",marginBottom:".6rem"}}>{sub.scene}</div>
                <iframe src={getYTEmbed(sub.link)} title="Scene" allowFullScreen allow="autoplay"/>
                <div className="row" style={{marginTop:"1rem"}}>
                  <button className="btn btn-gray" onClick={function(){setWatchingId(null);}}>← Back</button>
                  {allSubmitted&&<button className="btn btn-gold" onClick={openVoting}>Open Voting →</button>}
                </div>
              </div>
            );
          })():(
            <div style={{textAlign:"center"}}>
              <p style={{color:"#888",fontFamily:"'Playfair Display',serif",fontStyle:"italic",marginBottom:".8rem"}}>
                {allSubmitted?"All nominations in!":"Some nominations in."} Screen each director's scene:
              </p>
              <div className="row">
                {directors.filter(function(d){return submissions[d.id];}).map(function(d){return(
                  <button key={d.id} className="btn" style={{background:d.color,color:"#fff"}} onClick={function(){setWatchingId(d.id);}}>▶ {d.name}</button>
                );})}
              </div>
              {anySubmitted&&(
                <button className="btn btn-gold" style={{marginTop:"1rem"}} onClick={openVoting}>Open Voting →</button>
              )}
              {!allSubmitted&&(
                <button className="btn btn-gray" style={{marginTop:".5rem",fontSize:".78rem"}} onClick={openVoting}>Skip & Open Voting →</button>
              )}
            </div>
          )
        )}

        {/* Voting phase */}
        {votingOpen&&!roundScored&&(
          <div style={{textAlign:"center",width:"100%",maxWidth:560}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#aaa",marginBottom:"1rem"}}>
              Voting is open — directors are casting their votes on their phones…
            </div>
            <div style={{display:"flex",gap:"1rem",justifyContent:"center",flexWrap:"wrap",marginBottom:"1.2rem"}}>
              {directors.map(function(d){
                const hasVoted=votes[d.id]!=null;
                const hasSubmission=submissions[d.id]!=null;
                return(
                  <div key={d.id} style={{textAlign:"center"}}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:hasVoted?"#16a34a":"#333",margin:"0 auto .3rem"}}/>
                    <div style={{fontSize:".75rem",color:hasVoted?"#16a34a":"#555"}}>{d.name}</div>
                    {!hasSubmission&&<div style={{fontSize:".65rem",color:"#444"}}>no submission</div>}
                  </div>
                );
              })}
            </div>
            {allVoted&&(
              <button className="btn btn-gold btn-lg" onClick={closeVotingAndScore}>Reveal Results →</button>
            )}
            {!allVoted&&(
              <button className="btn btn-gray" style={{fontSize:".78rem"}} onClick={closeVotingAndScore}>Close Voting Early →</button>
            )}
          </div>
        )}

        {/* Vote results */}
        {roundScored&&(
          <div style={{width:"100%",maxWidth:500}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#aaa",textAlign:"center",marginBottom:"1rem"}}>The votes are in…</div>
            <div className="vote-results">
              {[...directors].sort(function(a,b){return (voteCounts[b.id]||0)-(voteCounts[a.id]||0);}).map(function(d){
                const total=Math.max(...directors.map(function(x){return voteCounts[x.id]||0;}),1);
                const pct=Math.round(((voteCounts[d.id]||0)/total)*100);
                return(
                  <div key={d.id} className="vote-result-row">
                    <div style={{width:12,height:12,borderRadius:"50%",background:d.color,flexShrink:0}}/>
                    <div style={{fontSize:".82rem",fontWeight:600,color:d.color,minWidth:100}}>{d.name}</div>
                    <div className="vote-bar-wrap">
                      <div className="vote-bar" style={{width:pct+"%",background:d.color}}/>
                    </div>
                    <div style={{fontSize:".78rem",color:"#888",minWidth:50,textAlign:"right"}}>{voteCounts[d.id]||0} vote{(voteCounts[d.id]||0)!==1?"s":""} +{roundScores[d.id]||0}pts</div>
                  </div>
                );
              })}
            </div>
            {cur<4
              ?<div style={{textAlign:"center",marginTop:"1.5rem"}}><button className="btn btn-gold btn-lg" onClick={nextRound}>Next Round →</button></div>
              :<div style={{textAlign:"center",marginTop:"1.5rem"}}><button className="btn btn-gold btn-lg" onClick={function(){setGame(function(g){return Object.assign({},g,{currentRound:5});});}}>See Final Results →</button></div>
            }
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const hash=window.location.hash;
  const isPlayer=hash.startsWith("#player")||hash==="#join";
  return isPlayer?<PlayerApp/>:<HostApp/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
